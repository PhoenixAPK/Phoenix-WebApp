<style>
/* 🔹 GLOBAL RESET & FONTS */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
body { background: #ffffff; padding: 20px 40px; color: #111827; line-height: 1.5; }

/* 🔹 MAIN MENU (Start Screen) - IDENTICAL TO CAR MAINTENANCE */
.main-menu { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
.menu-btn { padding: 16px 40px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; color: #374151; }
.menu-btn:hover { background: #e5e7eb; }

/* 🔹 SECTIONS (Hidden by default) */
.section-view { display: none; }
.section-view.active { display: block; }

/* 🔹 RETURN BUTTON (Inside Sections) */
.section-header { display: flex; align-items: center; margin-bottom: 20px; }
.back-btn { width: 90px; height: 34px; background: #e5e7eb; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.back-btn:hover { background: #d1d5db; }

/* 🔹 QUEUE CONTAINER & STYLES */
.queue-container { margin: 0 auto; width: 95%; max-width: 1200px; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e0e0e0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.queue-header-box { background: #e5e7eb; display: grid; grid-template-columns: 60% 40%; border-bottom: 1px solid #d1d5db; align-items: center; }
.header-title { padding: 14px 30px; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; color: #000; }
.header-stats { padding: 12px 30px; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; border-left: 1px solid #d1d5db; flex-direction: column; gap: 8px; color: #000; }

.export-buttons { display: flex; gap: 8px; }
.export-btn { padding: 6px 12px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; color: #374151; }
.export-btn:hover { background: #111827; color: #fff; border-color: #111827; }

/* 🔹 FORM STYLES */
.payment-form { padding: 24px; }
.form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }

/* ✅ BLACK TIMES NEW ROMAN TITLES */
.form-group label {
    font-size: 14px;
    font-weight: bold;
    color: #000;
    font-family: 'Times New Roman', serif;
}

.form-group input, .form-group select {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 13px;
    width: 100%;
    background: #fff;
}
.form-group input:disabled, .form-group select:disabled {
    background: #f3f4f6;
    color: #6b7280;
    cursor: not-allowed;
}

/* 🔹 ACTION BUTTONS */
.form-actions { display: flex; justify-content: center; gap: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e7eb; }
.action-btn { padding: 10px 30px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; }
.save-btn { background: #2e7d32; color: white; }
.save-btn:hover { background: #1b5e20; }
.complete-btn { background: #9ca3af; color: white; cursor: not-allowed; }
.complete-btn.enabled { background: #dc2626; cursor: pointer; }
.complete-btn.enabled:hover { background: #b91c1c; }

/* 🔹 COMPLETED LIST */
.completed-list { padding: 20px; }
.completed-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
.completed-table th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #e5e7eb; font-family: 'Times New Roman', serif; color: #000; }
.completed-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
.completed-table tr:hover { background: #f9f9f9; }
.open-btn { background: #2563eb; color: white; padding: 6px 12px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; }
.open-btn:hover { background: #1d4ed8; }

/* 🔹 SEARCH STYLES - IDENTICAL TO CAR MAINTENANCE */
.search-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
.search-tab { padding: 10px 24px; border: 1px solid #d1d5db; border-radius: 20px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }
.search-tab.active { background: #111827; color: #fff; border-color: #111827; }
.search-panel { display: none; justify-content: center; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-panel.active { display: flex; }
.search-label { font-weight: 600; color: #374151; }
.search-input { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
.search-submit { padding: 10px 24px; background: #111827; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
.search-submit:hover { background: #374151; }
.months-horizontal { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.month-chip { padding: 10px 16px; border: 1px solid #d1d5db; border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; background: #fff; min-width: 70px; }
.month-chip:hover { background: #f3f4f6; }
.years-horizontal { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
.year-chip { padding: 10px 20px; border: 1px solid #d1d5db; border-radius: 6px; text-align: center; cursor: pointer; font-size: 14px; background: #fff; }
.year-chip:hover, .year-chip.active { background: #111827; color: #fff; border-color: #111827; }
.result-label { text-align: center; margin-bottom: 20px; font-weight: 600; color: #059669; font-size: 15px; }
.hidden { display: none !important; }

@media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-actions { flex-direction: column; }
    .action-btn { width: 100%; }
}
</style>
</head>

    resetSearchState();
    document.getElementById('mainMenu').style.display = 'flex';
    document.querySelectorAll('.section-view').forEach(el => el.classList.remove('active'));
};

window.handleSearchReturn = function() {
    if (!document.getElementById('searchResultsContainer').classList.contains('hidden')) {
        resetSearchState();
    } else {
        goToMainMenu();
    }
};

function resetSearchState() {
    document.getElementById('searchTools').style.display = 'block';
    document.querySelector('.search-nav').classList.remove('hidden');
    document.querySelectorAll('.search-panel').forEach(p => { 
        p.classList.remove('active'); 
        p.style.display = 'none'; 
    });
    document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));

};

// Auto-fill Region from City
window.autoFillRegion = function() {
    const city = document.getElementById('city').value;
    document.getElementById('region').value = cityRegionMap[city] || '';
};

// Calculate Total
window.calculateTotal = function() {
    const p1 = parseFloat(document.getElementById('payment1').value) || 0;
    const p2 = parseFloat(document.getElementById('payment2').value) || 0;
    const p3 = parseFloat(document.getElementById('payment3').value) || 0;
    document.getElementById('totalDisplay').textContent = (p1 + p2 + p3).toFixed(3);
};

// Save Payment
window.savePayment = async function() {
    const formData = {
        mode: document.getElementById('mode').value,
        name: document.getElementById('name').value,
        contact: document.getElementById('contact').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        region: document.getElementById('region').value,
        total_pictures: document.getElementById('totalPictures').value,
        total_m2: document.getElementById('totalM2').value,
        invoice_id: document.getElementById('invoiceId').value,
        request_id: document.getElementById('requestId').value,
        interaction_id: document.getElementById('interactionId').value,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        confirmation_date: document.getElementById('confirmationDate').value,
        payment_1: document.getElementById('payment1').value,
        payment_2: document.getElementById('payment2').value,
        payment_3: document.getElementById('payment3').value,
        total: (parseFloat(document.getElementById('payment1').value) || 0) + 
               (parseFloat(document.getElementById('payment2').value) || 0) + 
               (parseFloat(document.getElementById('payment3').value) || 0),
        status: 'saved'
    };

    if (!formData.mode || !formData.name || !formData.contact) {
        alert("Please fill Mode, Name, and Contact.");
        return;
    }

    try {
        let result;
        if (currentRecordId) {
            result = await DB.from('payments').update(formData).eq('id', currentRecordId);
        } else {
            result = await DB.from('payments').insert([formData]).select();
        }
        if (result.error) throw result.error;
        
        currentRecordId = result.data ? result.data[0].id : currentRecordId;
        
        document.querySelectorAll('#paymentForm input, #paymentForm select').forEach(el => el.disabled = true);
        document.getElementById('completeBtn').disabled = false;
        document.getElementById('completeBtn').classList.add('enabled');
        alert("Saved successfully!");
    } catch (err) {
        alert("Error: " + err.message);
    }
};

// Complete Payment
window.completePayment = async function() {
    if (!currentRecordId) return;
    if (!confirm("Mark as completed?")) return;
    try {
        await DB.from('payments').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', currentRecordId);
        alert("Marked as completed!");
        resetForm();
    } catch (err) {
        alert("Error: " + err.message);
    }
};

// Open Payment Details
async function openPayment(id) {
    const { data } = await DB.from('payments').select('*').eq('id', id).single();
    if (!data) return;
    
    showPayment();
    currentRecordId = id;
    document.getElementById('mode').value = data.mode;
    document.getElementById('name').value = data.name;
    document.getElementById('contact').value = data.contact;
    document.getElementById('email').value = data.email;
    document.getElementById('address').value = data.address;
    document.getElementById('city').value = data.city;
    document.getElementById('region').value = data.region;
    document.getElementById('totalPictures').value = data.total_pictures;
    document.getElementById('totalM2').value = data.total_m2;
    document.getElementById('invoiceId').value = data.invoice_id;
    document.getElementById('requestId').value = data.request_id;
    document.getElementById('interactionId').value = data.interaction_id;
    document.getElementById('startDate').value = data.start_date;
    document.getElementById('endDate').value = data.end_date;
    document.getElementById('confirmationDate').value = data.confirmation_date;
    document.getElementById('payment1').value = data.payment_1;
    document.getElementById('payment2').value = data.payment_2;
    document.getElementById('payment3').value = data.payment_3;
    calculateTotal();
    
    document.querySelectorAll('#paymentForm input, #paymentForm select').forEach(el => el.disabled = true);
    document.getElementById('completeBtn').disabled = false;
    document.getElementById('completeBtn').classList.add('enabled');
}

// Set Form Disabled/Enabled
function setFormDisabled(disabled) {
    const inputs = document.querySelectorAll('#paymentForm input, #paymentForm select');
    inputs.forEach(input => {
        input.disabled = disabled;
    });
}

// Reset Form
function resetForm() {
    document.getElementById('paymentForm').reset();
    currentRecordId = null;
    setFormDisabled(false);
    document.getElementById('completeBtn').disabled = true;
    document.getElementById('completeBtn').classList.remove('enabled');
    document.getElementById('totalDisplay').textContent = '0.000';
}

// Load Completed Records
async function loadCompletedRecords() {
    const { data, error } = await DB.from('payments').select('*').eq('status', 'completed').order('created_at', { ascending: false });
    if (error) return;
    
    const tbody = document.getElementById('completedTableBody');
    tbody.innerHTML = '';
    document.getElementById('completedCount').textContent = data.length;
    
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">No records</td></tr>';
        return;
    }
    
    data.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${r.mode}</td>
            <td>${r.name}</td>
            <td>${r.contact}</td>
            <td>${r.invoice_id || '-'}</td>
            <td>${r.total_m2 || '-'}</td>
            <td style="font-weight:bold; color:#16a34a;">${r.total.toFixed(3)} Dh</td>
            <td style="color:#16a34a;">Completed</td>
            <td><button class="open-btn" onclick="openPayment('${r.id}')">Open</button></td>
        `;
        tbody.appendChild(tr);
    });
}

// Search Functions
function initSearchTools() { 
    renderMonthlyGrid(); 
    renderYearlyGrid(); 
}

window.switchSearchMode = function(mode) {
    document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.search-panel').forEach(p => { 
        p.classList.remove('active'); 
        p.style.display = 'none'; 
    });
    
    // Add active class to clicked tab
    event.target.classList.add('active');
    
    // Show selected panel
    const panel = document.getElementById(`panel-${mode}`);
    panel.classList.add('active');
    panel.style.display = 'flex';
    
    hideSearchResults();
};

function hideSearchResults() {
    document.getElementById('searchResultsContainer').classList.add('hidden');
    document.getElementById('resultLabel').classList.add('hidden');
}

const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

function renderMonthlyGrid() {
    const grid = document.getElementById('monthlyGrid'); 
    grid.innerHTML = '';
    const cy = new Date().getFullYear();
    MONTHS.forEach((m, i) => {
        const val = `${cy}-${String(i+1).padStart(2,'0')}`;
        const chip = document.createElement('div'); 
        chip.className = 'month-chip'; 
        chip.textContent = m;
        chip.onclick = () => executeSearch(val, `Monthly: ${m} ${cy}`); 
        grid.appendChild(chip);
    });
}

function renderYearlyGrid() {
    const grid = document.getElementById('yearlyGrid'); 
    grid.innerHTML = '';
    for(let y = 2026; y <= 2036; y++) {
        const chip = document.createElement('div'); 
        chip.className = 'year-chip'; 
        chip.textContent = y;
        chip.onclick = () => selectYear(y); 
        grid.appendChild(chip);
    }
}

window.selectYear = function(year) {
    document.querySelectorAll('.year-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    
    const mg = document.getElementById('yearlyMonthGrid'); 
    mg.style.display = 'flex'; 
    mg.innerHTML = '';
    
    MONTHS.forEach((m, i) => {
        const val = `${year}-${String(i+1).padStart(2,'0')}`;
        const chip = document.createElement('div'); 
        chip.className = 'month-chip'; 
        chip.textContent = m;
        chip.onclick = () => executeSearch(val, `Monthly: ${m} ${year}`); 
        mg.appendChild(chip);
    });
};

window.searchByRange = function() {
    const from = document.getElementById('searchFrom').value;
    const to = document.getElementById('searchTo').value;
    if(!from || !to) { alert("Select dates."); return; }
    DB.from('payments').select('*').gte('confirmation_date', from).lte('confirmation_date', to).order('confirmation_date', {ascending: false}).then(({ data, error }) => {
        if(error) { alert("Error: " + error.message); return; }
        renderSearchResults(data, `Range: ${from} to ${to}`);
    });
};

function executeSearch(monthVal, label) {
    DB.from('payments').select('*').eq('confirmation_date', `${monthVal}-01`).order('confirmation_date', {ascending: false}).then(({ data, error }) => {
        if(error) { alert("Error: " + error.message); return; }
        renderSearchResults(data, label);
    });
}

function renderSearchResults(data, label) {
    currentSearchData = data || [];
    document.getElementById('searchTools').style.display = 'none';
    document.getElementById('resultLabel').textContent = `Showing results for: ${label}`;
    document.getElementById('resultLabel').classList.remove('hidden');
    const tbody = document.getElementById('searchTableBody'); 
    tbody.innerHTML = '';
    
    if(!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">No results found</td></tr>';
        document.getElementById('searchTotal').textContent = '0.00';
        document.getElementById('searchResultsContainer').classList.remove('hidden'); 
        return;
    }
    
    let total = 0;
    data.forEach(row => {
        total += row.total;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.mode}</td><td>${row.name}</td><td>${row.contact}</td><td>${row.invoice_id || '-'}</td><td style="font-weight:bold; color:#16a34a;">${row.total.toFixed(3)} Dh</td><td style="color:#16a34a;">${row.status}</td>`;
        tbody.appendChild(tr);
    });
    document.getElementById('searchTotal').textContent = total.toFixed(3);
    document.getElementById('searchResultsContainer').classList.remove('hidden');
}

// Export Functions
window.exportCSV = function(source) {
    let data = [];
    if(source === 'current') {
        DB.from('payments').select('*').eq('status', 'saved').then(({ data: r, error }) => {
            if(error || !r) return alert("No data.");
            downloadCSV(r, `Payments_${new Date().toISOString().slice(0,7)}`);
        });
    } else {
        if(!currentSearchData.length) return alert("No data.");
        downloadCSV(currentSearchData, `Payments_Search`);
    }
};

function downloadCSV(data, filename) {
    let csv = 'Mode,Name,Contact,Email,Address,City,Region,Total Pictures,Total M2,Invoice ID,Request ID,Interaction ID,Start Date,End Date,Confirmation Date,Payment 1,Payment 2,Payment 3,Total,Status\n';
    data.forEach(row => { 
        csv += `"${row.mode}","${row.name}","${row.contact}","${row.email}","${row.address}","${row.city}","${row.region}","${row.total_pictures}","${row.total_m2}","${row.invoice_id}","${row.request_id}","${row.interaction_id}","${row.start_date}","${row.end_date}","${row.confirmation_date}","${row.payment_1}","${row.payment_2}","${row.payment_3}","${row.total}","${row.status}"\n`; 
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `${filename}.csv`; 
    a.click();
}

window.exportPDF = function(source) {
    let data = [];
    if(source === 'current') {
        DB.from('payments').select('*').eq('status', 'saved').then(({ data: r, error }) => {
            if(error || !r) return alert("No data.");
            generatePDF(r, `Payments - ${new Date().toISOString().slice(0,7)}`);
        });
    } else {
        if(!currentSearchData.length) return alert("No data.");
        generatePDF(currentSearchData, `Payments - Search Results`);
    }
};

function generatePDF(data, title) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18); 
    doc.text(title, 14, 20);
    doc.autoTable({
        startY: 35, 
        head: [['Mode', 'Name', 'Contact', 'Invoice ID', 'Total', 'Status']],
        body: data.map(r => [r.mode, r.name, r.contact, r.invoice_id || '-', `${r.total.toFixed(3)} Dh`, r.status]),
        theme: 'grid', 
        headStyles: { fillColor: [17, 24, 39] },
        foot: [['', '', '', '', 'Total:', `${data.reduce((s,r) => s+r.total, 0).toFixed(3)} Dh`]],
        footStyles: { fillColor: [243, 244, 246], textColor: [0,0,0], fontStyle: 'bold' }
    });
    doc.save(`${title.replace(/\s+/g, '_')}.pdf`);
}
