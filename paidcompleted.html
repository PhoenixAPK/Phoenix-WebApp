* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
body { background: #ffffff; padding: 20px 40px; color: #111827; }

/* 🔹 MAIN MENU (START SCREEN) - EXACT MATCH */
.main-menu { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
.menu-btn { padding: 16px 40px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; color: #374151; }
.menu-btn:hover { background: #e5e7eb; }

/* 🔹 SECTIONS */
.section-view { display: none; }
.section-view.active { display: block; }

/* 🔹 RETURN BUTTON & HEADER */
.section-header { display: flex; align-items: center; margin-bottom: 20px; }
.back-btn { width: 90px; height: 34px; background: #e5e7eb; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.back-btn:hover { background: #d1d5db; }

.queue-container { margin: 0 auto; width: 95%; max-width: 1200px; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e0e0e0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.queue-header-box { background: #e5e7eb; display: grid; grid-template-columns: 60% 40%; border-bottom: 1px solid #d1d5db; align-items: center; }
.header-title { padding: 14px 30px; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; color: #000; }
.header-stats { padding: 12px 30px; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; border-left: 1px solid #d1d5db; color: #000; }

/* 🔹 FORM STYLES */
.payment-form { padding: 24px; }
.form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }

/* ✅ BLACK TIMES NEW ROMAN TITLES */
.form-group label {
    font-size: 14px;
    font-weight: bold;
    color: #000;
    font-family: 'Times New Roman', serif;
}

.form-group input, .form-group select {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 13px;
    width: 100%;
    background: #fff;
}
.form-group input:disabled, .form-group select:disabled {
    background: #f3f4f6;
    color: #6b7280;
    cursor: not-allowed;
}

/* 🔹 ACTION BUTTONS */
.form-actions { display: flex; justify-content: center; gap: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e7eb; }
.action-btn { padding: 10px 30px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; }
.save-btn { background: #2e7d32; color: white; }
.save-btn:hover { background: #1b5e20; }
.complete-btn { background: #9ca3af; color: white; cursor: not-allowed; }
.complete-btn.enabled { background: #dc2626; cursor: pointer; }
.complete-btn.enabled:hover { background: #b91c1c; }

/* 🔹 COMPLETED LIST */
.completed-list { padding: 20px; }
.completed-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
.completed-table th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #e5e7eb; font-family: 'Times New Roman', serif; color: #000; }
.completed-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
.completed-table tr:hover { background: #f9f9f9; }
.open-btn { background: #2563eb; color: white; padding: 6px 12px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; }
.open-btn:hover { background: #1d4ed8; }

@media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-actions { flex-direction: column; }
    .action-btn { width: 100%; }
}

function autoFillRegion() {
    const city = document.getElementById('city').value;
    document.getElementById('region').value = cityRegionMap[city] || '';
}

function calculateTotal() {
    const p1 = parseFloat(document.getElementById('payment1').value) || 0;
    const p2 = parseFloat(document.getElementById('payment2').value) || 0;
    const p3 = parseFloat(document.getElementById('payment3').value) || 0;
    document.getElementById('totalDisplay').textContent = (p1 + p2 + p3).toFixed(3);
}

async function savePayment() {
    const formData = {
        mode: document.getElementById('mode').value,
        name: document.getElementById('name').value,
        contact: document.getElementById('contact').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        region: document.getElementById('region').value,
        total_pictures: document.getElementById('totalPictures').value,
        total_m2: document.getElementById('totalM2').value,
        invoice_id: document.getElementById('invoiceId').value,
        request_id: document.getElementById('requestId').value,
        interaction_id: document.getElementById('interactionId').value,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        confirmation_date: document.getElementById('confirmationDate').value,
        payment_1: document.getElementById('payment1').value,
        payment_2: document.getElementById('payment2').value,
        payment_3: document.getElementById('payment3').value,
        total: (parseFloat(document.getElementById('payment1').value) || 0) + 
               (parseFloat(document.getElementById('payment2').value) || 0) + 
               (parseFloat(document.getElementById('payment3').value) || 0),
        status: 'saved'
    };

    if (!formData.mode || !formData.name || !formData.contact) {
        alert("Please fill Mode, Name, and Contact.");
        return;
    }

    try {
        let result;
        if (currentRecordId) {
            result = await DB.from('payments').update(formData).eq('id', currentRecordId);
        } else {
            result = await DB.from('payments').insert([formData]).select();
        }
        if (result.error) throw result.error;
        
        currentRecordId = result.data ? result.data[0].id : currentRecordId;
        
        // Disable inputs (Read Mode)
        document.querySelectorAll('#paymentForm input, #paymentForm select').forEach(el => el.disabled = true);
        document.getElementById('completeBtn').disabled = false;
        document.getElementById('completeBtn').classList.add('enabled');
        alert("Saved successfully!");
    } catch (err) {
        alert("Error: " + err.message);
    }
}

async function completePayment() {
    if (!currentRecordId) return;
    if (!confirm("Mark as completed?")) return;
    try {
        await DB.from('payments').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', currentRecordId);
        alert("Marked as completed!");
        goToMainMenu();
    } catch (err) {
        alert("Error: " + err.message);
    }
}

async function loadCompletedRecords() {
    const { data, error } = await DB.from('payments').select('*').eq('status', 'completed').order('created_at', { ascending: false });
    if (error) return;
    
    const tbody = document.getElementById('completedTableBody');
    tbody.innerHTML = '';
    document.getElementById('completedCount').textContent = data.length;
    
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">No records</td></tr>';
        return;
    }
    
    data.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${r.mode}</td>
            <td>${r.name}</td>
            <td>${r.contact}</td>
            <td>${r.invoice_id || '-'}</td>
            <td>${r.total_m2 || '-'}</td>
            <td style="font-weight:bold; color:#16a34a;">${r.total.toFixed(3)} Dh</td>
            <td style="color:#16a34a;">Completed</td>
            <td><button class="open-btn" onclick="openPayment('${r.id}')">Open</button></td>
        `;
        tbody.appendChild(tr);
    });
}

async function openPayment(id) {
    const { data } = await DB.from('payments').select('*').eq('id', id).single();
    if (!data) return;
    
    showPayment();
    currentRecordId = id;
    document.getElementById('mode').value = data.mode;
    document.getElementById('name').value = data.name;
    document.getElementById('contact').value = data.contact;
    document.getElementById('email').value = data.email;
    document.getElementById('address').value = data.address;
    document.getElementById('city').value = data.city;
    document.getElementById('region').value = data.region;
    document.getElementById('totalPictures').value = data.total_pictures;
    document.getElementById('totalM2').value = data.total_m2;
    document.getElementById('invoiceId').value = data.invoice_id;
    document.getElementById('requestId').value = data.request_id;
    document.getElementById('interactionId').value = data.interaction_id;
    document.getElementById('startDate').value = data.start_date;
    document.getElementById('endDate').value = data.end_date;
    document.getElementById('confirmationDate').value = data.confirmation_date;
    document.getElementById('payment1').value = data.payment_1;
    document.getElementById('payment2').value = data.payment_2;
    document.getElementById('payment3').value = data.payment_3;
    calculateTotal();
    
    document.querySelectorAll('#paymentForm input, #paymentForm select').forEach(el => el.disabled = true);
    document.getElementById('completeBtn').disabled = false;
    document.getElementById('completeBtn').classList.add('enabled');
}

function resetForm() {
    document.getElementById('paymentForm').reset();
    currentRecordId = null;
    document.querySelectorAll('#paymentForm input, #paymentForm select').forEach(el => el.disabled = false);
    document.getElementById('completeBtn').disabled = true;
    document.getElementById('completeBtn').classList.remove('enabled');
    document.getElementById('totalDisplay').textContent = '0.000';
}
</script>
</body>
</html>
