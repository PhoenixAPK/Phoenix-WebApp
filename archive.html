<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Printing Solutions | Redefine Your Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400:700&family=Plus+Jakarta+Sans:wght@300:500:800&family=Roboto:wght@400:500:700&display=swap" rel="stylesheet">
  <script src="assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --electric-lime:#00FF87; --fire-orange:#ff4d00; --fire-yellow:#ffcc00; --pps-green:#066d44; --pps-admin-green:#046C4E; }
    *{margin:0;padding:0;box-sizing:border-box}
    body { background:#ffffff; }
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:none;z-index:-1}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#000;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00}
    .nav-buttons{display:flex;gap:20px}
    .nav-btn{text-decoration:none;color:#000;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;transition:.3s;border:1px solid transparent}
    .nav-btn:hover{color:var(--electric-lime);border-color:var(--electric-lime);background:rgba(0,255,135,0.1)}
    .main-content{width:100%;display:flex;justify-content:center}
    
    .queue-container{margin:40px auto 0;width:90%;max-width:1200px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;box-shadow:0 4px 20px rgba(0,0,0,0.08);color:#000}
    
    .queue-header-box{
      background:#e5e7eb;
      color:#000;
      padding:0;
      display:grid;
      grid-template-columns: 60% 40%;
      border-bottom:1px solid #d1d5db;
    }
    .header-title{
      padding:12px 30px;
      font-family:'Times New Roman', Times, serif;
      font-weight:bold;
      font-size:1.1rem;
      letter-spacing:2px;
      display:flex;
      align-items:center;
      justify-content: center;
    }
    .header-stats{
      padding:12px 30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      border-left:1px solid #d1d5db;
      font-family:'Times New Roman', Times, serif;
    }
    .stats-count{
      font-size:1.1rem;
      font-weight:bold;
      color:#000;
    }
    
    table{width:100%;border-collapse:collapse;text-align:left}
    thead{background:#fafafa}
    th{
      padding:15px 30px;
      font-family:'Times New Roman', Times, serif;
      font-weight:bold;
      font-size:0.85rem;
      border-bottom:1px solid #e0e0e0;
      color:#000;
    }
    td{
      padding:18px 30px;
      border-bottom:1px solid #eee;
      font-size:0.85rem;
      color:#000;
    }
    tr:hover td{background:#f9f9f9}
    .ref-code{font-family:monospace;font-weight:bold;color:#000}
    .action-cell{display:flex;gap:10px;align-items:center}
    .btn-action{border:none;padding:8px 16px;border-radius:6px;font-size:10px;font-weight:bold;cursor:pointer;color:white;text-transform:uppercase;transition:opacity .2s}
    .activate-btn{background:#2e7d32}
    .delete-btn{background:#c62828}
    .btn-action:hover{opacity:0.8}
    footer{position:fixed;bottom:0;left:0;right:0;height:68px;background:rgba(0,0,0,0.85);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;z-index:1000}
    .footer-logo{height:30px;margin-right:15px}
    footer p{font-family:'Syncopate';font-size:0.62rem;letter-spacing:3px;opacity:0.7;color:#000;margin:0}

    .queue-info {
      font-family: 'Times New Roman', Times, serif;
      font-weight: normal;
      font-size: 0.9rem;
    }
    .mode-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      border: 1px solid;
    }
    .mode-client {
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      border-color: #00d4ff;
    }
    .mode-entrepreneur {
      background: rgba(255, 204, 0, 0.1);
      color: #ffcc00;
      border-color: #ffcc00;
    }

    #hiddenInvoiceWrap { position: absolute; left: -9999px; top: 0; width: 800px; color: #333; }
    .invoice-container { padding: 30px; background: #ffffff; border-radius: 12px; }
    .invoice-header { text-align: center; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; }
    .invoice-header img { max-height: 60px; margin-bottom: 8px; }
    .invoice-header h1 { margin: 0; font-size: 22px; font-weight: 700; color: var(--pps-admin-green); }
    .invoice-title { text-align: center; font-weight: 700; font-size: 18px; margin: 20px 0 8px; text-transform: uppercase; color: var(--pps-admin-green); }
    .invoice-client-info { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
    .invoice-client-line { display: flex; justify-content: center; width: 100%; max-width: 350px; font-size: 14px; color: #444; line-height: 1.6; }
    .invoice-client-label { width: 110px; text-align: right; font-weight: 700; margin-right: 10px; font-size: 13px; }
    .invoice-client-value { text-align: left; flex: 1; font-size: 13px; }
    .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .invoice-table th, .invoice-table td { border: 1px solid #e0e0e0; padding: 8px; text-align: center; font-size: 12px; }
    .invoice-table th { background: var(--pps-admin-green); color: #fff; font-weight: 700; }
    .invoice-table td.total { font-weight: bold; background: #cdeacf; color: #333; }
    .invoice-additional-costs { width: 50%; margin-left: auto; font-size: 13px; margin-bottom: 20px; }
    .invoice-additional-costs table { width: 100%; border: none; }
    .invoice-additional-costs td { padding: 6px; text-align: left; border: none; }
    .invoice-additional-costs td.value { text-align: right; }
    .invoice-grand-total { font-weight: bold; background: #cdeacf; text-align: right; padding: 8px; margin-top: 8px; font-size: 14px; }
    .invoice-footer { display: flex; font-size: 11px; justify-content: center; gap: 15px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; color: #666; }
  </style>
</head>
<body>
  

  <div class="main-content">
    <div class="queue-container">
      <div class="queue-header-box">
        <div class="header-title">ARCHIVE HISTORY</div>
        <div class="header-stats">
          <div class="stats-count" id="archiveCount">0 Items</div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>REF CODE</th>
            <th>Name</th>
            <th>City</th>
            <th>Workspace</th>
            <th>Mode</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="archiveBody"></tbody>
      </table>
    </div>
  </div>

  <div id="hiddenInvoiceWrap"></div>

  

  <script>
  (function(){
    const LOGO_PATH = '../assets/images/PPS logo.png';

    async function generateVisualInvoicePDF(req) {
      const isEnt = req.is_entrepreneur || false;
      const basePrice = isEnt ? 200 : 250;
      const city = req.location?.city || "Rabat";
      const phone = req.client?.phone || req.business?.phone || "N/A";
      
      let totalChargeArea = 0;
      const rowsHtml = (req.workspaces || []).map((ws, i) => {
        const h = parseFloat(ws.height) || 0;
        const w = parseFloat(ws.width) || 0;
        const actual = h * w;
        let charge = 0;
        if(actual > 0){
          if(actual <= 1) charge = 1;
          else if(actual <= 1.49) charge = 1.5;
          else if(actual <= 1.99) charge = 2;
          else charge = Math.ceil(actual * 2) / 2;
        }
        totalChargeArea += charge;
        return `<tr><td>Workspace ${i+1}</td><td>${h.toFixed(2)}x${w.toFixed(2)}</td><td>${actual.toFixed(2)}</td><td>${charge.toFixed(2)}</td><td>${basePrice.toFixed(2)}</td><td>${(charge*basePrice).toFixed(2)}</td></tr>`;
      }).join('');

      const baseCost = totalChargeArea * basePrice;
      const travel = (parseFloat(req.costs?.fuelPrice) || 0) + (parseFloat(req.costs?.tollPrice) || 0) + (parseFloat(req.costs?.accommodationPrice) || 0);
      const grand = baseCost + travel;

      const wrap = document.getElementById('hiddenInvoiceWrap');
      wrap.innerHTML = `
        <div class="invoice-container">
          <div class="invoice-header"><img src="${LOGO_PATH}" alt="Logo" /><h1>Phoenix Printing Solutions</h1></div>
          <div class="invoice-title">Invoice: ${isEnt ? 'Business' : 'Client'} - ${req.client?.name || 'Customer'}</div>
          <div class="invoice-client-info">
            <div class="invoice-client-line"><div class="invoice-client-label">${isEnt ? 'Business Name:' : 'Client Name:'}</div><div class="invoice-client-value">${req.client?.name || 'N/A'}</div></div>
            <div class="invoice-client-line"><div class="invoice-client-label">Phone:</div><div class="invoice-client-value">${phone}</div></div>
            <div class="invoice-client-line"><div class="invoice-client-label">City:</div><div class="invoice-client-value">${city}</div></div>
          </div>
          <table class="invoice-table">
            <thead><tr><th>Item</th><th>Size</th><th>Actual</th><th>Charge</th><th>Price</th><th>Cost</th></tr></thead>
            <tbody>${rowsHtml}<tr class="total"><td colspan="3">Total Area</td><td>${totalChargeArea.toFixed(2)}</td><td></td><td>${baseCost.toFixed(2)}</td></tr></tbody>
          </table>
          <div class="invoice-additional-costs">
            <table>
              <tr><td>Travel Total</td><td class="value">${travel.toFixed(2)} DH</td></tr>
              <tr style="font-weight:bold; background:#cdeacf;"><td style="padding:10px;">GRAND TOTAL</td><td class="value" style="padding:10px;">${grand.toFixed(2)} DH</td></tr>
            </table>
          </div>
          <div class="invoice-footer"><div>Phoenix Printing Solutions</div><div>0667336303</div></div>
        </div>`;

      const canvas = await html2canvas(wrap, { scale: 2, useCORS: true });
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
      return pdf.output("blob");
    }

    async function uploadPdfToSupabase(req, pdfBlob) {
      const cleanName = (req.client?.name || "Customer").replace(/[^a-z0-9]/gi, '_');
      const cleanCity = (req.location?.city || "City").replace(/[^a-z0-9]/gi, '_');
      const refId = req.record_id || req.request_id.slice(0, 8).toUpperCase();
      const fileName = `PPS-${cleanName}-${cleanCity}-${refId}.pdf`;

      console.log("📤 Uploading to Supabase Storage:", fileName);
      
      // 🔹 Try both possible bucket names (case-sensitive)
      const bucketNames = ["Archive-invoice", "archive-invoice", "archive_invoice"];
      let uploadResult = null;
      
      for (const bucketName of bucketNames) {
        try {
          console.log(`🔍 Trying bucket: ${bucketName}`);
          const { data, error } = await window.supabaseClient.storage
            .from(bucketName)
            .upload(`archive/${fileName}`, pdfBlob, { 
              contentType: "application/pdf", 
              upsert: true,
              cacheControl: '3600'
            });
          
          if (error) {
            console.warn(`❌ Bucket ${bucketName} failed:`, error);
            continue;
          }
          
          console.log(`✅ Successfully uploaded to bucket: ${bucketName}`, data);
          uploadResult = data;
          break;
        } catch (bucketErr) {
          console.warn(`❌ Bucket ${bucketName} error:`, bucketErr);
          continue;
        }
      }
      
      if (!uploadResult) {
        throw new Error("Failed to upload to any storage bucket. Check bucket name and RLS policies.");
      }
      
      return uploadResult;
    }

    window.finishItem = async function(id) {
      console.log("🔄 Starting archive process for ID:", id);
      
      try {
        // Step 1: Fetch the request data
        console.log("1️⃣ Fetching request data...");
        const { data: req, error: fetchError } = await window.supabaseClient
          .from("pps_queue")
          .select("*")
          .eq("request_id", id)
          .single();
        
        if (fetchError) {
          console.error("❌ Failed to fetch request:", fetchError);
          alert("Error: Could not fetch request data.");
          return;
        }
        
        if (!req) {
          console.error("❌ Request not found");
          alert("Error: Request not found.");
          return;
        }
        
        console.log("✅ Request data fetched:", req);
        
        // Step 2: Generate PDF
        console.log("2️⃣ Generating PDF...");
        const pdfBlob = await generateVisualInvoicePDF(req);
        console.log("✅ PDF generated, size:", pdfBlob.size, "bytes");
        
        // Step 3: Upload to Supabase Storage
        console.log("3️⃣ Uploading PDF to storage...");
        await uploadPdfToSupabase(req, pdfBlob);
        console.log("✅ PDF uploaded successfully");
        
        // Step 4: Delete from pps_queue
        console.log("4️⃣ Deleting from pps_queue...");
        const { error: delErr } = await window.supabaseClient
          .from("pps_queue")
          .delete()
          .eq("request_id", id);
        
        if (delErr) {
          console.error("❌ Failed to delete from queue:", delErr);
          alert("PDF saved, but failed to remove from queue. Please try again.");
          return;
        }
        
        console.log("✅ Request deleted from queue");
        
        // Step 5: Refresh the list
        fetchAndRender();
        alert("✅ Archived and PDF saved successfully!");
        
      } catch (err) {
        console.error("❌ Critical error in finishItem:", err);
        alert("Error finishing item: " + err.message + "\n\nCheck console for details.");
      }
    };

    window.activateItem = async function(id){
      try{
        const { error } = await window.supabaseClient.from('pps_queue')
          .update({ status:'pending', created_at: new Date().toISOString() })
          .eq('request_id', id);
        if(error) throw error;
        fetchAndRender();
      } catch(err){ alert("Error activating item."); }
    }

    async function fetchAndRender(){
      try {
        console.log("🔍 Starting fetchAndRender...");
        
        if (!window.supabaseClient) {
          console.error("❌ Supabase client not initialized");
          return;
        }

        console.log("📡 Querying database for archived items...");
        
        const { data, error } = await window.supabaseClient
          .from('pps_queue')
          .select('*')
          .eq('status', 'archived')
          .order('created_at', { ascending: false });
        
        console.log("📥 Database response:", { data, error });
        
        if(error) {
          console.error("❌ Archive fetch error:", error);
          document.getElementById('archiveBody').innerHTML = 
            `<tr><td colspan="6" style="text-align:center; padding:50px; color:red;">Error loading data: ${error.message}</td></tr>`;
          return;
        }
        
        if (!data) {
          console.warn("⚠️ No data returned from database");
          document.getElementById('archiveBody').innerHTML = 
            '<tr><td colspan="6" style="text-align:center; padding:50px; opacity:0.5;">No data returned</td></tr>';
          return;
        }
        
        console.log(`✅ Found ${data.length} archived items`);
        render(data);
      } catch(err) {
        console.error("❌ Error in fetchAndRender:", err);
        document.getElementById('archiveBody').innerHTML = 
          `<tr><td colspan="6" style="text-align:center; padding:50px; color:red;">Error: ${err.message}</td></tr>`;
      }
    }

    function render(data){
      console.log("🎨 Rendering data:", data);
      
      var tbody=document.getElementById('archiveBody');
      var countLabel=document.getElementById('archiveCount');
      if(!tbody) {
        console.error("❌ tbody element not found");
        return;
      }
      
      tbody.innerHTML='';
      countLabel.innerText = `${data.length} Items`;
      
      if(data.length === 0){
        console.log("ℹ️ No archived items to display");
        tbody.innerHTML='<tr><td colspan="6" style="text-align:center; padding:50px; opacity:0.5; font-family: Times New Roman;">No archived requests found.</td></tr>';
        return;
      }
      
      data.forEach(function(req, index){
        console.log(`Processing item ${index + 1}:`, req);
        
        var tr=document.createElement('tr');
        
        const displayId = req.record_id || `#${req.request_id.slice(0,8).toUpperCase()}`;
        
        const mode = (req.sourceMode || req.source_mode || req.mode || 'client').toLowerCase();
        const modeClass = mode === 'entrepreneur' ? 'mode-entrepreneur' : 'mode-client';
        const modeLabel = mode === 'entrepreneur' ? 'Entrepreneur' : 'Client';
        
        console.log(`  - Mode detected: ${mode}, Class: ${modeClass}, Label: ${modeLabel}`);
        
        tr.innerHTML=`
          <td class="ref-code queue-info">${displayId}</td>
          <td class="queue-info">${req.client?.name || 'N/A'}</td>
          <td class="queue-info">${req.location?.city || 'N/A'}</td>
          <td class="queue-info">${req.workspaces?.length || 0} Units</td>
          <td class="queue-info"><span class="mode-badge ${modeClass}">${modeLabel}</span></td>
          <td>
            <div class="action-cell">
              <button class="btn-action activate-btn" onclick="activateItem('${req.request_id}')">Activate</button>
              <button class="btn-action delete-btn" onclick="finishItem('${req.request_id}')">Finished</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
      
      console.log("✅ Rendering complete");
    }

    document.addEventListener('DOMContentLoaded', fetchAndRender);
  })();
  </script>
</body>
</html>
