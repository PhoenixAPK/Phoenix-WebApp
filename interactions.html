
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactions</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #ffffff; padding: 40px; color: #111827; }
        .nav-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .main-btn {
            flex: 1; max-width: 200px; padding: 20px; background: #e5e7eb;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-align: center; transition: background 0.2s;
        }
        .main-btn:hover { background: #d1d5db; }
        .main-btn.active { background: #111827; color: white; }
        .section { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .step-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .full-width { grid-column: span 3; margin-top: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        select, input, textarea { padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; width: 100%; }
        textarea { height: 120px; resize: none; }
        .action-btn { margin-top: 20px; padding: 15px 30px; background: #111827; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .result-card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; cursor: pointer; background: #f9f9f9; }
        .result-card:hover { background: #f0f0f0; border-color: #111827; }
        .hidden { display: none; }
        .quick-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .q-btn { padding: 8px 12px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="nav-container">
        <button class="main-btn" onclick="showSection('new-section', this)">New</button>
        <button class="main-btn" onclick="showSection('search-section', this)">Search</button>
        <button class="main-btn" onclick="showSection('export-section', this)">Export</button>
    </div>

    <div id="new-section" class="section">
        <div class="step-row">
            <div style="flex:1">
                <label>Source</label>
                <select id="source" onchange="handleSourceChange()">
                    <option value="">Select Source</option>
                    <option>Phone</option><option>Email</option><option>PhoenixWeb</option>
                    <option>Websearch</option><option>Facebook</option><option>Instagram</option>
                    <option>TikTok</option><option>YouTube</option>
                </select>
            </div>
            <div id="mode-div" class="hidden" style="flex:1">
                <label>Mode</label>
                <select id="mode" onchange="handleModeChange()">
                    <option value="">Select Mode</option>
                    <option>Client</option><option>Entrepreneur</option>
                </select>
            </div>
        </div>
        <div id="form-fields" class="hidden">
            <div class="input-grid">
                <div><label>Name</label><input type="text" id="name"></div>
                <div><label>Phone</label><input type="text" id="phone"></div>
                <div><label>Email</label><input type="email" id="email"></div>
                <div><label>Address</label><input type="text" id="address"></div>
                <div><label>City</label><input type="text" id="city"></div>
                <div><label>Total Pictures</label><input type="number" id="pics"></div>
                <div class="full-width"><label>Note</label><textarea id="note"></textarea></div>
            </div>
            <button class="action-btn" id="save-btn" onclick="saveData()">Save Interaction</button>
        </div>
    </div>

    <div id="search-section" class="section">
        <div class="input-grid">
            <div><label>Search Name</label><input type="text" id="s-name" oninput="searchData()"></div>
            <div><label>Search Phone</label><input type="text" id="s-phone" oninput="searchData()"></div>
            <div><label>Search Email</label><input type="text" id="s-email" oninput="searchData()"></div>
            <div><label>Search Address</label><input type="text" id="s-address" oninput="searchData()"></div>
        </div>
        <div id="search-results" style="margin-top:20px;"></div>
    </div>

    <div id="export-section" class="section">
        <div class="quick-select">
            <button class="q-btn" onclick="setQuickDate('today')">Today</button>
            <button class="q-btn" onclick="setQuickDate('week')">This Week</button>
            <button class="q-btn" onclick="setQuickDate('month')">This Month</button>
        </div>
        <div class="step-row">
            <div style="flex:1"><label>From</label><input type="date" id="date-from"></div>
            <div style="flex:1"><label>To</label><input type="date" id="date-to"></div>
        </div>
        <button class="action-btn" onclick="exportCSV()">Download Complete CSV</button>
    </div>
<script>
    const SUPABASE_URL = "https://puymabrkwtpvhropcvqk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eW1hYnJrd3Rwdmhyb3BjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyOTUsImV4cCI6MjA4ODg2NzI5NX0.kg7WvMRblzVf2iaQbt4Zz7DuNDgHGn9AKFHM_maGiTk";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
        document.getElementById('search-results').innerHTML = "";
    }

    function handleSourceChange() {
        const val = document.getElementById('source').value;
        document.getElementById('mode-div').classList.toggle('hidden', val === "");
        if (val === "") {
            document.getElementById('mode').value = "";
            handleModeChange();
        }
    }

    function handleModeChange() {
        const val = document.getElementById('mode').value;
        document.getElementById('form-fields').classList.toggle('hidden', val === "");
    }

    async function saveData() {
        const interaction = {
            source: source.value,
            mode: mode.value,
            name: name.value.trim(),
            phone: phone.value.trim(),
            email: email.value.trim(),
            address: address.value.trim(),
            city: city.value.trim(),
            total_pictures: pics.value || 0,
            note: note.value.trim()
        };

        const { data: existing } = await supabaseClient
            .from('interactions')
            .select('*')
            .eq('name', interaction.name)
            .eq('phone', interaction.phone)
            .eq('email', interaction.email)
            .eq('address', interaction.address)
            .eq('city', interaction.city)
            .order('created_at', { ascending: true })
            .limit(1);

        const now = new Date().toLocaleString();

        if (existing && existing.length > 0) {
            const original = existing[0];
            const updatedNote =
                (original.note || "") +
                `\n\n[Interaction Updated: ${now}]\n` +
                interaction.note;

            await supabaseClient
                .from('interactions')
                .update({ note: updatedNote })
                .eq('id', original.id);

            alert("Linked to existing interaction. No duplicate created.");
            location.reload();
            return;
        }

        const { error } = await supabaseClient
            .from('interactions')
            .insert([interaction]);

        if (error) alert(error.message);
        else {
            alert("Saved Successfully");
            location.reload();
        }
    }

    async function searchData() {
        const n = s-name.value.trim();
        const p = s-phone.value.trim();
        const e = s-email.value.trim();
        const a = s-address.value.trim();
        const resultsDiv = document.getElementById('search-results');

        if (!n && !p && !e && !a) {
            resultsDiv.innerHTML = "";
            return;
        }

        let query = supabaseClient
            .from('interactions')
            .select('*')
            .order('created_at', { ascending: true });

        if (n) query = query.ilike('name', `%${n}%`);
        if (p) query = query.ilike('phone', `%${p}%`);
        if (e) query = query.ilike('email', `%${e}%`);
        if (a) query = query.ilike('address', `%${a}%`);

        const { data } = await query;

        const map = {};
        data.forEach(i => {
            const key = `${i.name}|${i.phone}|${i.email}|${i.address}|${i.city}`;
            if (!map[key]) map[key] = { item: i, count: 1 };
            else map[key].count++;
        });

        resultsDiv.innerHTML = Object.values(map).map(v => `
            <div class="result-card" onclick="loadOriginal('${encodeURIComponent(JSON.stringify(v.item))}')">
                <strong>${v.item.name}</strong> - ${v.item.phone}
                <span style="float:right;font-size:12px;color:#555;">×${v.count}</span><br>
                <small>Source: ${v.item.source} | ${new Date(v.item.created_at).toLocaleString()}</small>
            </div>
        `).join('');
    }

    function loadOriginal(encoded) {
        const item = JSON.parse(decodeURIComponent(encoded));
        showSection('new-section', document.querySelectorAll('.main-btn')[0]);

        source.value = item.source;
        handleSourceChange();
        mode.value = item.mode;
        handleModeChange();

        name.value = item.name || '';
        phone.value = item.phone || '';
        email.value = item.email || '';
        address.value = item.address || '';
        city.value = item.city || '';
        pics.value = item.total_pictures || 0;

        note.value = item.note || '';
    }
</script>
</body>
</html>
