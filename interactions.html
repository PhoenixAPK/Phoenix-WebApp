<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactions</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #ffffff; padding: 40px; color: #111827; }
        .nav-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .main-btn {
            flex: 1; max-width: 200px; padding: 20px; background: #e5e7eb;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-align: center; transition: background 0.2s;
        }
        .main-btn:hover { background: #d1d5db; }
        .main-btn.active { background: #111827; color: white; }
        .section { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .step-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .full-width { grid-column: span 3; margin-top: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        select, input, textarea { padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; width: 100%; }
        textarea { height: 120px; resize: none; }
        .action-btn { margin-top: 20px; padding: 15px 30px; background: #111827; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .result-card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; cursor: pointer; background: #f9f9f9; }
        .result-card:hover { background: #f0f0f0; border-color: #111827; }
        .hidden { display: none; }
        .quick-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .q-btn { padding: 8px 12px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="nav-container">
        <button class="main-btn" onclick="showSection('new-section', this)">New</button>
        <button class="main-btn" onclick="showSection('search-section', this)">Search</button>
        <button class="main-btn" onclick="showSection('export-section', this)">Export</button>
    </div>

    <div id="new-section" class="section">
        <div class="step-row">
            <div style="flex:1">
                <label>Source</label>
                <select id="source" onchange="handleSourceChange()">
                    <option value="">Select Source</option>
                    <option>Phone</option><option>Email</option><option>PhoenixWeb</option>
                    <option>Websearch</option><option>Facebook</option><option>Instagram</option>
                    <option>TikTok</option><option>YouTube</option>
                </select>
            </div>
            <div id="mode-div" class="hidden" style="flex:1">
                <label>Mode</label>
                <select id="mode" onchange="handleModeChange()">
                    <option value="">Select Mode</option>
                    <option>Client</option><option>Entrepreneur</option>
                </select>
            </div>
        </div>
        <div id="form-fields" class="hidden">
            <div class="input-grid">
                <div><label>Name</label><input type="text" id="name"></div>
                <div><label>Phone</label><input type="text" id="phone"></div>
                <div><label>Email</label><input type="email" id="email"></div>
                <div><label>Address</label><input type="text" id="address"></div>
                <div><label>City</label><input type="text" id="city"></div>
                <div><label>Total Pictures</label><input type="number" id="pics"></div>
                <div class="full-width"><label>Note</label><textarea id="note"></textarea></div>
            </div>
            <button class="action-btn" id="save-btn" onclick="saveData()">Save Interaction</button>
        </div>
    </div>

    <div id="search-section" class="section">
        <div class="input-grid">
            <div><label>Search Name</label><input type="text" id="s-name" oninput="searchData()"></div>
            <div><label>Search Phone</label><input type="text" id="s-phone" oninput="searchData()"></div>
            <div><label>Search Email</label><input type="text" id="s-email" oninput="searchData()"></div>
            <div><label>Search Address</label><input type="text" id="s-address" oninput="searchData()"></div>
        </div>
        <div id="search-results" style="margin-top:20px;"></div>
    </div>

    <div id="export-section" class="section">
        <div class="quick-select">
            <button class="q-btn" onclick="setQuickDate('today')">Today</button>
            <button class="q-btn" onclick="setQuickDate('week')">This Week</button>
            <button class="q-btn" onclick="setQuickDate('month')">This Month</button>
        </div>
        <div class="step-row">
            <div style="flex:1"><label>From</label><input type="date" id="date-from"></div>
            <div style="flex:1"><label>To</label><input type="date" id="date-to"></div>
        </div>
        <button class="action-btn" onclick="exportCSV()">Download Complete CSV</button>
    </div>

    <script>
        const SUPABASE_URL = "https://puymabrkwtpvhropcvqk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eW1hYnJrd3Rwdmhyb3BjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyOTUsImV4cCI6MjA4ODg2NzI5NX0.kg7WvMRblzVf2iaQbt4Zz7DuNDgHGn9AKFHM_maGiTk";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
            
            document.getElementById('search-results').innerHTML = "";
            if(id === 'search-section') {
                ['s-name', 's-phone', 's-email', 's-address'].forEach(id => document.getElementById(id).value = "");
            }
        }

        function handleSourceChange() {
            const val = document.getElementById('source').value;
            document.getElementById('mode-div').classList.toggle('hidden', val === "");
            if(val === "") { document.getElementById('mode').value = ""; handleModeChange(); }
        }

        function handleModeChange() {
            const val = document.getElementById('mode').value;
            document.getElementById('form-fields').classList.toggle('hidden', val === "");
        }

        async function saveData() {
            const interaction = {
                source: document.getElementById('source').value,
                mode: document.getElementById('mode').value,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                total_pictures: document.getElementById('pics').value || 0,
                note: document.getElementById('note').value
            };
            const { error } = await supabaseClient.from('interactions').insert([interaction]);
            if (error) alert("Error: " + error.message);
            else { alert("Saved Successfully"); location.reload(); }
        }

        async function searchData() {
            const name = document.getElementById('s-name').value.trim();
            const phone = document.getElementById('s-phone').value.trim();
            const email = document.getElementById('s-email').value.trim();
            const address = document.getElementById('s-address').value.trim();
            const resultsDiv = document.getElementById('search-results');

            if (!name && !phone && !email && !address) {
                resultsDiv.innerHTML = "";
                return; 
            }

            let query = supabaseClient.from('interactions').select('*');
            if(name) query = query.ilike('name', `%${name}%`);
            if(phone) query = query.ilike('phone', `%${phone}%`);
            if(email) query = query.ilike('email', `%${email}%`);
            if(address) query = query.ilike('address', `%${address}%`);
            
            const { data } = await query.order('created_at', { ascending: false }).limit(10);
            
            if (!document.getElementById('s-name').value && !document.getElementById('s-phone').value && !document.getElementById('s-email').value && !document.getElementById('s-address').value) {
                resultsDiv.innerHTML = "";
                return;
            }

            if (data && data.length > 0) {
                resultsDiv.innerHTML = data.map(i => `
                    <div class="result-card" onclick="loadOriginal('${encodeURIComponent(JSON.stringify(i))}')">
                        <strong>${i.name || 'N/A'}</strong> - ${i.phone || 'N/A'}<br>
                        <small>Source: ${i.source} | ${new Date(i.created_at).toLocaleString()}</small>
                    </div>
                `).join('');
            } else {
                resultsDiv.innerHTML = "<p style='color:#999; margin-top:10px;'>No matches found.</p>";
            }
        }

        function loadOriginal(encodedData) {
            const item = JSON.parse(decodeURIComponent(encodedData));
            showSection('new-section', document.querySelectorAll('.main-btn')[0]);
            
            document.getElementById('source').value = item.source;
            handleSourceChange();
            document.getElementById('mode').value = item.mode;
            handleModeChange();
            
            document.getElementById('name').value = item.name || '';
            document.getElementById('phone').value = item.phone || '';
            document.getElementById('email').value = item.email || '';
            document.getElementById('address').value = item.address || '';
            document.getElementById('city').value = item.city || '';
            document.getElementById('pics').value = item.total_pictures || 0;
            
            const savedTime = new Date(item.created_at).toLocaleString();
            document.getElementById('note').value = item.note + "\n\n[Interaction Saved: " + savedTime + "]";
        }

        function setQuickDate(range) {
            const to = new Date().toISOString().split('T')[0];
            let from = new Date();
            if(range === 'week') from.setDate(from.getDate() - 7);
            if(range === 'month') from.setMonth(from.getMonth() - 1);
            document.getElementById('date-from').value = from.toISOString().split('T')[0];
            document.getElementById('date-to').value = to;
        }

        async function exportCSV() {
            const from = document.getElementById('date-from').value;
            const to = document.getElementById('date-to').value;
            if(!from || !to) return alert("Please select date range.");

            // Get all data within range
            const { data } = await supabaseClient.from('interactions')
                .select('*')
                .gte('created_at', from)
                .lte('created_at', to + 'T23:59:59');

            if(!data || data.length === 0) return alert("No data found for these dates.");

            // Headers for ALL fields
            let csv = "Date,Time,Source,Mode,Name,Phone,Email,Address,City,Pictures,Note\n";
            
            data.forEach(r => {
                const dateObj = new Date(r.created_at);
                const dateStr = dateObj.toLocaleDateString();
                const timeStr = dateObj.toLocaleTimeString();
                
                // Escape quotes in notes to prevent CSV breaking
                const cleanNote = (r.note || "").replace(/"/g, '""');
                const cleanAddr = (r.address || "").replace(/"/g, '""');
                
                csv += `${dateStr},${timeStr},${r.source},${r.mode},${r.name},${r.phone},${r.email},"${cleanAddr}",${r.city},${r.total_pictures},"${cleanNote}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Phoenix_Interactions_${from}_to_${to}.csv`;
            a.click();
        }
    </script>
</body>
</html>
