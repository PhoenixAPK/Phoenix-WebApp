<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phoenix Printing Solutions | Redefine Your Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400:700&family=Plus+Jakarta+Sans:wght@300:500:800&family=Roboto:wght@400:500:700&display=swap" rel="stylesheet"/>
  <script src="assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --electric-lime:#00FF87; --fire-orange:#ff4d00; --fire-yellow:#ffcc00; --pps-green:#066d44; }
    *{margin:0;padding:0;box-sizing:border-box}
    body { background:#ffffff; }
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:none;z-index:-1}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#000;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00}
    .nav-buttons{display:flex;gap:20px}
    .nav-btn{text-decoration:none;color:#000;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;transition:.3s;border:1px solid transparent}
    .nav-btn:hover{color:var(--electric-lime);border-color:var(--electric-lime);background:rgba(0,255,135,0.1)}
    .main-content{width:100%;display:flex;justify-content:center}
    
    .queue-container{margin:40px auto 0;width:90%;max-width:1200px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;box-shadow:0 4px 20px rgba(0,0,0,0.08);color:#000}
    
    .queue-header-box{
      background:#e5e7eb;
      color:#000;
      padding:0;
      display:grid;
      grid-template-columns: 60% 40%;
      border-bottom:1px solid #d1d5db;
    }
    .header-title{
      padding:12px 30px;
      font-family:'Times New Roman', Times, serif;
      font-weight:bold;
      font-size:1.1rem;
      letter-spacing:2px;
      display:flex;
      align-items:center;
      justify-content: center;
    }
    .header-stats{
      padding:12px 30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      border-left:1px solid #d1d5db;
      font-family:'Times New Roman', Times, serif;
    }
    .stats-count{
      font-size:1.1rem;
      font-weight:bold;
      color:#000;
    }
    
    table{width:100%;border-collapse:collapse;text-align:left}
    thead{background:#fafafa}
    th{
      padding:15px 30px;
      font-family:'Times New Roman', Times, serif;
      font-weight:bold;
      font-size:0.85rem;
      border-bottom:1px solid #e0e0e0;
      color:#000;
    }
    td{
      padding:18px 30px;
      border-bottom:1px solid #eee;
      font-size:0.85rem;
      color:#000;
      cursor: pointer;
      transition: background 0.2s;
    }
    tr:hover td{background:#f9f9f9}
    .ref-code{font-family:monospace;font-weight:bold;color:#000}
    
    .queue-info {
      font-family: 'Times New Roman', Times, serif;
      font-weight: normal;
      font-size: 0.9rem;
    }
    .mode-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      border: 1px solid;
    }
    .mode-client {
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      border-color: #00d4ff;
    }
    .mode-entrepreneur {
      background: rgba(255, 204, 0, 0.1);
      color: #ffcc00;
      border-color: #ffcc00;
    }
    
    footer{position:fixed;left:0;right:0;bottom:0;height:68px;background:rgba(0,0,0,0.85);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;z-index:1000}
    .footer-logo{height:30px;margin-right:15px}
    footer p{font-family:'Syncopate';font-size:0.62rem;letter-spacing:3px;opacity:0.7;color:#000;margin:0}
  </style>
</head>
<body>
  
  <div class="main-content">
    <div class="queue-container">
      <div class="queue-header-box">
        <div class="header-title">PENDING REQUESTS</div>
        <div class="header-stats">
          <div class="stats-count" id="pendingCount">0 Items</div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>REF CODE</th>
            <th>Name</th>
            <th>City</th>
            <th>Workspace</th>
            <th>Mode</th>
            <th>Time & Date</th>
          </tr>
        </thead>
        <tbody id="queueBody"></tbody>
      </table>
    </div>
  </div>
  
  <script>
  (function(){
    window.moveToInProgress = async (id) => {
      try {
        await fetch("https://puymabrkwtpvhropcvqk.supabase.co/functions/v1/move-to-inprogress", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eW1hYnJrd3Rwdmhyb3BjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyOTUsImV4cCI6MjA4ODg2NzI5NX0.kg7WvMRblzVf2iaQbt4Zz7DuNDgHGn9AKFHM_maGiTk"
          },
          body: JSON.stringify({ request_id: id })
        });
      } catch (err) {
        console.error("Error moving to in-progress:", err);
      }
    };

    function handleRequestClick(id, mode) {
      const target = `admininvoice.html?request_id=${id}&mode=${mode}`; 
      
      try {
        window.supabaseClient
          .from('pps_queue')
          .update({ status: 'in-progress' })
          .eq('request_id', id)
          .then(({ error }) => { 
             if (error) console.error('Status update failed:', error); 
             window.location.href = target;
          })
          .catch(err => {
             console.error('Update error:', err);
             window.location.href = target;
          });
      } catch (e) { 
        console.error(e); 
        window.location.href = target;
      }
    }

    async function fetchAndRender(){
      try {
        console.log("🔍 Fetching pending requests...");
        if (!window.supabaseClient) {
          console.error("❌ Supabase client not initialized");
          return;
        }

        const {   data, error } = await window.supabaseClient
          .from('pps_queue')
          .select('*')
          .or('status.eq.pending,status.is.null')
          .order('created_at', { ascending: false });
        
        console.log("📥 Database response:", { data, error });
        
        if(error) {
          console.error("❌ Pending fetch error:", error);
          document.getElementById('queueBody').innerHTML = 
            `<tr><td colspan="6" style="text-align:center; padding:50px; color:red;">Error loading  ${error.message}</td></tr>`;
          return;
        }
        
        if (!data) {
          console.warn("⚠️ No data returned");
          document.getElementById('queueBody').innerHTML = 
            '<tr><td colspan="6" style="text-align:center; padding:50px; opacity:0.5;">No pending requests</td></tr>';
          return;
        }
        
        console.log(`✅ Found ${data.length} pending items`);
        render(data || []);
      } catch (err) { 
        console.error('Error fetching queue:', err); 
        document.getElementById('queueBody').innerHTML = 
          `<tr><td colspan="6" style="text-align:center; padding:50px; color:red;">Error: ${err.message}</td></tr>`;
      }
    }

    function render(items){
      const tbody = document.getElementById('queueBody');
      const countLabel = document.getElementById('pendingCount');
      tbody.innerHTML = '';
      
      countLabel.innerText = `${items.length} Items`;
      
      if(items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px; opacity:0.5; font-family: Times New Roman;">No pending requests found.</td></tr>';
        return;
      }
      
      items.forEach(req => {
        const tr = document.createElement('tr');
        const mode = (req.sourceMode || req.source_mode || req.mode || 'client').toLowerCase();
        
        tr.onclick = () => {
          handleRequestClick(req.request_id, mode);
          window.moveToInProgress(req.request_id);
        };
        
        const time = req.created_at
          ? new Date(req.created_at).toLocaleString([], {
              day: '2-digit',
              month: 'short',
              year: 'numeric',
              hour:'2-digit',
              minute:'2-digit'
            })
          : '--:--';
        
        const modeClass = mode === 'entrepreneur' ? 'mode-entrepreneur' : 'mode-client';
        const modeLabel = mode === 'entrepreneur' ? 'Entrepreneur' : 'Client';
        
        // Use record_id if available, else fallback to request_id
        const displayId = req.record_id || `#${req.request_id.slice(0,8).toUpperCase()}`;
        
        tr.innerHTML = `
          <td class="ref-code queue-info">${displayId}</td>
          <td class="queue-info"><strong>${req.client?.name || 'Unknown'}</strong></td>
          <td class="queue-info">${req.location?.city || '---'}</td>
          <td class="queue-info">${(req.workspaces || []).length} Units</td>
          <td class="queue-info"><span class="mode-badge ${modeClass}">${modeLabel}</span></td>
          <td class="queue-info">${time}</td>`;
        tbody.appendChild(tr);
      });
    }

    function subscribeToChanges() {
      if (window.supabaseClient && window.supabaseClient.channel) {
        window.supabaseClient
          .channel('pps_queue_changes')
          .on('postgres_changes', { event: '*', table: 'pps_queue' }, () => fetchAndRender())
          .subscribe();
      }
    }

    document.addEventListener('DOMContentLoaded', () => { 
      fetchAndRender(); 
      subscribeToChanges(); 
    });
  })();
  </script>
</body>
</html>
