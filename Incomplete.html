
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incomplete</title>
  https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
    body{background:#ffffff;padding:24px;color:#111827}

    h1{display:none}

    .top-bar{display:flex;justify-content:flex-end;gap:12px;margin-bottom:16px}
    .view-btn{padding:8px 14px;border:none;border-radius:6px;background:#e5e7eb;cursor:pointer;font-weight:600}
    .view-btn:hover{background:#d1d5db}

    .header-row,.item-row{display:grid;grid-template-columns:1fr 2fr 1fr 1fr 120px;align-items:center}
    .header-row{padding:14px 10px;font-weight:700;text-transform:uppercase;font-size:13px;border-bottom:1px solid #d1d5db}
    .item-row{padding:14px 10px;border-bottom:1px solid #e5e7eb;font-size:14px}

    .open-btn{padding:6px 12px;border:none;border-radius:6px;background:#e5e7eb;cursor:pointer}
    .open-btn:hover{background:#d1d5db}

    .calendar{margin-bottom:20px;font-size:14px;font-weight:600}
  </style>
</head>
<body>

  <h1>Incomplete</h1>

  <div class="top-bar">
    <button class="view-btn" onclick="monthlyView()">Monthly View</button>
    <button class="view-btn" onclick="yearlyView()">Yearly View</button>
  </div>

  <div class="calendar" id="calendarLabel"></div>

  <div class="header-row">
    <div>Reference</div>
    <div>Client / Business Name</div>
    <div>City</div>
    <div>Units</div>
    <div>Action</div>
  </div>

  <div id="list"></div>

<script>
  /* Reuse existing Supabase client from shell / interactions */
  const sb = window.supabaseClient || supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();

  document.getElementById("calendarLabel").textContent =
    now.toLocaleString('default',{month:'long'}) + " " + currentYear;

  async function loadIncomplete(){
    const start = new Date(currentYear,currentMonth,1).toISOString();
    const end = new Date(currentYear,currentMonth+1,0,23,59,59).toISOString();

    const { data } = await sb
      .from('interactions')
      .select('*')
      .gte('created_at', start)
      .lte('created_at', end);

    const list = document.getElementById('list');
    list.innerHTML = "";

    (data || []).forEach(r => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <div>${r.id}</div>
        <div>${r.name}</div>
        <div>${r.city || ''}</div>
        <div>${r.total_pictures || 0}</div>
        <div><button class="open-btn" onclick="openItem('${r.id}','${r.mode}')">Open</button></div>
      `;
      list.appendChild(row);
    });
  }

  function openItem(id, mode){
    parent.document.getElementById('content-frame').src = `admininvoice.html?request_id=${id}`;
  }

  function monthlyView(){ loadIncomplete(); }

  loadIncomplete();

  window.parent.postMessage({type:'UPDATE_HEADER',title:'Incomplete'},"*");
</script>
</body>
