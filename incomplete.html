<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incomplete</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
    body{background:#fff;padding:24px;color:#111827}
    h1{display:none}

    .top-bar{display:flex;justify-content:flex-end;gap:12px;margin-bottom:16px}
    .view-btn{padding:8px 14px;border:none;border-radius:6px;background:#e5e7eb;cursor:pointer;font-weight:600}
    .view-btn:hover{background:#d1d5db}

    .header-row,.item-row{
      display:grid;
      grid-template-columns:1fr 2fr 1fr 1fr 120px;
      align-items:center
    }

    .header-row{
      padding:14px 10px;
      font-weight:700;
      font-size:13px;
      border-bottom:1px solid #d1d5db
    }

    .item-row{
      padding:14px 10px;
      border-bottom:1px solid #e5e7eb;
      font-size:14px
    }

    .open-btn{
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#e5e7eb;
      cursor:pointer
    }

    .open-btn:hover{background:#d1d5db}
    .calendar{margin-bottom:20px;font-weight:600}
  </style>
</head>

<body>

<h1>Incomplete</h1>

<div class="top-bar">
  <button class="view-btn" id="monthlyBtn">Monthly View</button>
  <button class="view-btn" id="yearlyBtn">Yearly View</button>
</div>

<div class="calendar" id="calendarLabel"></div>

<div class="header-row">
  <div>Reference</div>
  <div>Client / Business Name</div>
  <div>City</div>
  <div>Units</div>
  <div>Action</div>
</div>

<div id="list"></div>

<script>
  /* Supabase client (shared shell client if exists) */
  const sb = window.supabaseClient
    ? window.supabaseClient
    : window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const now = new Date();
  let month = now.getMonth();
  let year = now.getFullYear();

  const list = document.getElementById('list');
  const label = document.getElementById('calendarLabel');

  function updateLabel(){
    label.textContent = new Date(year, month).toLocaleString('default',{
      month:'long',
      year:'numeric'
    });
  }

  function openInvoice(mode, id){
    parent.document.getElementById('content-frame').src =
      `admininvoice.html?mode=${mode}&id=${id}`;
  }

  async function loadIncomplete(){
    updateLabel();

    const start = new Date(year, month, 1).toISOString();
    const end   = new Date(year, month + 1, 0, 23, 59, 59).toISOString();

    const { data, error } = await sb
      .from('interactions')
      .select('*')
      .eq('status', 'Incomplete')
      .gte('created_at', start)
      .lte('created_at', end)
      .order('created_at', { ascending:false });

    list.innerHTML = '';
    if(error || !data) return;

    data.forEach(r => {
      const mode =
        r.request_type === 'Client' ? 'client' :
        r.request_type === 'Entrepreneur' ? 'entrepreneur' : '';

      list.insertAdjacentHTML('beforeend', `
        <div class="item-row">
          <div>${r.reference || r.id}</div>
          <div>${r.client_name || r.business_name || ''}</div>
          <div>${r.city || ''}</div>
          <div>${r.units || 0}</div>
          <div>
            <button class="open-btn" onclick="openInvoice('${mode}', '${r.id}')">
              Open
            </button>
          </div>
        </div>
      `);
    });
  }

  /* View buttons */
  document.getElementById('monthlyBtn').onclick = () => {
    month = now.getMonth();
    year = now.getFullYear();
    loadIncomplete();
  };

  document.getElementById('yearlyBtn').onclick = () => {
    month = 0;
    year = now.getFullYear();
    loadIncomplete();
  };

  loadIncomplete();

  window.parent.postMessage(
    { type:'UPDATE_HEADER', title:'Incomplete' },
    '*'
  );
</script>

</body>
</html>
