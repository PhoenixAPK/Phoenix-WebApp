<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incomplete</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#fff;padding:24px;color:#111827}

.top-bar{display:flex;justify-content:flex-end;gap:12px;margin-bottom:16px}
select{padding:8px 12px;border:1px solid #d1d5db;border-radius:6px}

.header-row,.item-row{
  display:grid;
  grid-template-columns:1fr 2fr 1fr 1fr 120px;
  align-items:center
}
.header-row{font-weight:700;font-size:13px;border-bottom:1px solid #d1d5db}
.item-row{border-bottom:1px solid #e5e7eb;font-size:14px}

.open-btn{padding:6px 12px;border:none;border-radius:6px;background:#e5e7eb;cursor:pointer}
</style>
</head>

<body>

<div class="top-bar">
  <select id="monthSelect"></select>
  <select id="yearSelect"></select>
</div>

<div class="header-row">
  <div>Reference</div><div>Name</div><div>City</div><div>Units</div><div>Action</div>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://puymabrkwtpvhropcvqk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eW1hYnJrd3Rwdmhyb3BjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyOTUsImV4cCI6MjA4ODg2NzI5NX0.kg7WvMRblzVf2iaQbt4Zz7DuNDgHGn9AKFHM_maGiTk";

const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY,
  { global:{ headers:{ apikey: SUPABASE_KEY } } }
);

const list = document.getElementById('list');
const mSel = document.getElementById('monthSelect');
const ySel = document.getElementById('yearSelect');
const now = new Date();

for(let i=0;i<12;i++)
  mSel.innerHTML += `<option value="${i}" ${i===now.getMonth()?'selected':''}>
    ${new Date(2000,i).toLocaleString('default',{month:'long'})}</option>`;

for(let y=now.getFullYear()-5;y<=now.getFullYear()+1;y++)
  ySel.innerHTML += `<option value="${y}" ${y===now.getFullYear()?'selected':''}>${y}</option>`;

mSel.onchange = ySel.onchange = load;

function openInvoice(mode,id){
  parent.document.getElementById('content-frame').src =
    `admininvoice.html?mode=${mode}&id=${id}`;
}

async function load(){
  const start = new Date(ySel.value,mSel.value,1).toISOString();
  const end = new Date(ySel.value,Number(mSel.value)+1,0,23,59,59).toISOString();

  const { data } = await sb.from('interactions')
    .select('*')
    .gte('created_at',start)
    .lte('created_at',end)
    .order('created_at',{ascending:false});

  list.innerHTML='';
  (data||[]).forEach(r=>{
    list.insertAdjacentHTML('beforeend',`
      <div class="item-row">
        <div>${r.id}</div>
        <div>${r.name||''}</div>
        <div>${r.city||''}</div>
        <div>${r.total_pictures||0}</div>
        <div><button class="open-btn"
          onclick="openInvoice('${(r.mode||'').toLowerCase()}','${r.id}')">Open</button></div>
      </div>
    `);
  });
}

load();
window.parent.postMessage({type:'UPDATE_HEADER',title:'Incomplete'},'*');
</script>

</body>
</html>
