<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incomplete</title>

<!-- HARD CSP FIX (THIS WAS MISSING) -->
<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' https://cdn.jsdelivr.net;
style-src 'self' 'unsafe-inline';
connect-src 'self' https://*.supabase.co;
img-src 'self' data:;
frame-src 'self';
">

https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2

<!-- HARD RUNTIME GUARD -->
<script>
(function () {
  const file = location.pathname.split('/').pop().toLowerCase();
  if (file !== 'incomplete.html') {
    document.documentElement.innerHTML = '';
    throw new Error('Blocked: wrong page');
  }
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#fff;padding:24px;color:#111827}
.top-bar{display:flex;justify-content:flex-end;gap:12px;margin-bottom:16px}
select{padding:8px 12px;border:1px solid #d1d5db;border-radius:6px}
.header-row,.item-row{
  display:grid;
  grid-template-columns:1fr 2fr 1fr 1fr 120px;
  align-items:center
}
.header-row{font-weight:700;font-size:13px;border-bottom:1px solid #d1d5db}
.item-row{border-bottom:1px solid #e5e7eb;font-size:14px}
.open-btn{padding:6px 12px;border:none;border-radius:6px;background:#e5e7eb;cursor:pointer}
</style>
</head>

<body>

<div class="top-bar">
  <select id="month"></select>
  <select id="year"></select>
</div>

<div class="header-row">
  <div>Reference</div><div>Name</div><div>City</div><div>Units</div><div>Action</div>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://puymabrkwtpvhropcvqk.supabase.co";
const SUPABASE_KEY = "YOUR_REAL_ANON_KEY";

const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY,
  { global:{ headers:{ apikey: SUPABASE_KEY } } }
);

const list = document.getElementById('list');
const m = document.getElementById('month');
const y = document.getElementById('year');
const now = new Date();

for(let i=0;i<12;i++)
  m.innerHTML += `<option value="${i}" ${i===now.getMonth()?'selected':''}>
  ${new Date(2000,i).toLocaleString('default',{month:'long'})}</option>`;

for(let yr=now.getFullYear()-5;yr<=now.getFullYear()+1;yr++)
  y.innerHTML += `<option value="${yr}" ${yr===now.getFullYear()?'selected':''}>${yr}</option>`;

m.onchange = y.onchange = load;

function openInvoice(mode,id){
  parent.document.getElementById('content-frame').src =
    `admininvoice.html?mode=${mode}&id=${id}`;
}

async function load(){
  const start = new Date(y.value,m.value,1).toISOString();
  const end = new Date(y.value,Number(m.value)+1,0,23,59,59).toISOString();

  const { data } = await sb
    .from('interactions')
    .select('*')
    .gte('created_at',start)
    .lte('created_at',end)
    .order('created_at',{ascending:false});

  list.innerHTML='';
  (data||[]).forEach(r=>{
    list.insertAdjacentHTML('beforeend',`
      <div class="item-row">
        <div>${r.id}</div>
        <div>${r.name||''}</div>
        <div>${r.city||''}</div>
        <div>${r.total_pictures||0}</div>
        <div>
          <button class="open-btn"
          onclick="openInvoice('${(r.mode||'').toLowerCase()}','${r.id}')">
          Open</button>
        </div>
      </div>
    `);
  });
}

load();
window.parent.postMessage({type:'UPDATE_HEADER',title:'Incomplete'},'*');
</script>

</body>
</html>
