<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phoenix Webapp – Clients</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* IMPORTANT: iframe page must NOT control layout */
body {
  background: transparent;
  color: #111827;
}

/* MAIN BUTTON VIEW */
.nav-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 40px 0;
}

.main-btn {
  width: 160px;
  height: 110px;
  background: #e5e7eb;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.main-btn:hover {
  background: #d1d5db;
}

/* CLIENT VIEW */
.section {
  display: none;
  padding: 24px;
}

/* BACK */
.back-btn {
  background: none;
  border: none;
  font-weight: 600;
  margin-bottom: 16px;
  cursor: pointer;
}

/* CLIENT INFO */
.client-info {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.client-info label {
  display: block;
  margin-bottom: 4px;
  font-weight: 500;
  color: #333;
  font-size: 13px;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
}

.client-info input,
.client-info select {
  width: 100%;
  padding: 8px;
  border: 1px solid rgba(204,204,204,0.8);
  border-radius: 6px;
  font-size: 14px;
  background-color: rgba(255,255,255,0.9);
}

.client-info input:focus,
.client-info select:focus {
  border-color: #046C4E;
  outline: none;
  box-shadow: 0 0 5px rgba(4,108,78,0.3);
}

/* HISTORY */
.history-card {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.history-box {
  background: #f0f0f0;
  border-radius: 6px;
  padding: 15px;
  color: #666;
  font-size: 13px;
}

.history-note {
  font-size: 12px;
  font-style: italic;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- MAIN VIEW -->
<div id="mainView" class="nav-container">
  <button class="main-btn" onclick="openClient()">New</button>
  <button class="main-btn" onclick="openClient()">Search</button>
</div>

<!-- CLIENT VIEW -->
<div id="clientView" class="section">

  <button class="back-btn" onclick="goBack()">← Back</button>

  <div class="client-info">
    <div class="input-grid">
      <div><label>Name</label><input></div>
      <div><label>Contact</label><input></div>
      <div><label>Email</label><input></div>
      <div><label>Address</label><input></div>
      <div>
        <label>City</label>
        <select><option>Select City</option></select>
      </div>
      <div><label>Region</label><input></div>
    </div>
  </div>

  <div class="history-card">
    <div class="history-header">
      <strong>Client History</strong>
      <select>
        <option>Oldest → Newest</option>
        <option>Newest → Oldest</option>
      </select>
    </div>

    <div class="history-box">
      No history available for this client.
      <div class="history-note">
        History is read-only and cannot be modified.
      </div>
    </div>
  </div>

</div>

<script>
function openClient() {
  document.getElementById("mainView").style.display = "none";
  document.getElementById("clientView").style.display = "block";
}
function goBack() {
  document.getElementById("clientView").style.display = "none";
  document.getElementById("mainView").style.display = "flex";
}
</script>

</body>
</html>
