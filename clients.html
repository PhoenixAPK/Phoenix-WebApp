<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phoenix Webapp – Clients</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f5f7;
}

/* ===== MAIN VIEW ===== */
#mainView {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
}

.main-btn {
    width: 140px;
    height: 120px;
    border-radius: 10px;
    border: none;
    background: #e1e3e8;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
}

.main-btn:hover {
    background: #d6d8dd;
}

/* ===== CLIENT DETAIL ===== */
#clientView {
    display: none;
    padding: 20px;
}

.card {
    background: #ffffff;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
}

.client-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.field label {
    display: block;
    font-size: 12px;
    color: #666;
    margin-bottom: 5px;
}

.field input,
.field select {
    width: 100%;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
}

/* ===== HISTORY ===== */
.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.history-box {
    background: #efefef;
    padding: 15px;
    border-radius: 6px;
    color: #666;
}

.history-item {
    margin-bottom: 10px;
    padding: 10px;
    background: #e3e3e3;
    border-radius: 5px;
}

.history-item details summary {
    cursor: pointer;
    font-weight: 500;
}

.note {
    font-size: 12px;
    font-style: italic;
    margin-top: 10px;
}

.back-btn {
    background: none;
    border: none;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- ===== MAIN VIEW ===== -->
<div id="mainView">
    <button class="main-btn" onclick="openClient()">New</button>
    <button class="main-btn" onclick="openClient()">Search</button>
</div>

<!-- ===== CLIENT DETAIL VIEW ===== -->
<div id="clientView">

    <button class="back-btn" onclick="goBack()">← Back</button>

    <!-- CLIENT INFO -->
    <div class="card">
        <div class="client-grid">
            <div class="field">
                <label>Name</label>
                <input>
            </div>
            <div class="field">
                <label>Contact</label>
                <input>
            </div>
            <div class="field">
                <label>Email</label>
                <input>
            </div>
            <div class="field">
                <label>Address</label>
                <input>
            </div>
            <div class="field">
                <label>City</label>
                <select>
                    <option value="">Select City</option>
                </select>
            </div>
            <div class="field">
                <label>Region</label>
                <input>
            </div>
        </div>
    </div>

    <!-- CLIENT HISTORY -->
    <div class="card">
        <div class="history-header">
            <strong>Client History</strong>
            <select id="sortOrder">
                <option value="asc">Oldest → Newest</option>
                <option value="desc">Newest → Oldest</option>
            </select>
        </div>

        <div class="history-box" id="history">
            <div class="note">No history available for this client.</div>
            <div class="note">History is read-only and cannot be modified.</div>
        </div>
    </div>

</div>

<script>
const historyData = [];

function formatDate(dateStr, timeStr) {
    const d = new Date(dateStr + " " + timeStr);
    return d.toLocaleDateString("en-GB", {
        day: "2-digit",
        month: "long",
        year: "numeric"
    });
}

function renderHistory(order) {
    const container = document.getElementById("history");
    container.innerHTML = "";

    if (historyData.length === 0) {
        container.innerHTML = `
            <div class="note">No history available for this client.</div>
            <div class="note">History is read-only and cannot be modified.</div>
        `;
        return;
    }

    const sorted = [...historyData].sort((a, b) => {
        const d1 = new Date(a.date + " " + a.time);
        const d2 = new Date(b.date + " " + b.time);
        return order === "asc" ? d1 - d2 : d2 - d1;
    });

    sorted.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <details>
                <summary>${item.type} submitted on ${formatDate(item.date, item.time)}</summary>
                <div>
                    ${item.description}<br>
                    Time: ${item.time}
                </div>
            </details>
        `;
        container.appendChild(div);
    });

    const note = document.createElement("div");
    note.className = "note";
    note.textContent = "History is read-only and cannot be modified.";
    container.appendChild(note);
}

document.getElementById("sortOrder").addEventListener("change", e => {
    renderHistory(e.target.value);
});

function openClient() {
    document.getElementById("mainView").style.display = "none";
    document.getElementById("clientView").style.display = "block";
}

function goBack() {
    document.getElementById("clientView").style.display = "none";
    document.getElementById("mainView").style.display = "flex";
}

renderHistory("asc");
</script>

</body>
</html>
