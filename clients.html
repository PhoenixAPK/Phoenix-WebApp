<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clients</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: transparent;
  color: #111827;
}

/* ===== MAIN VIEW ===== */
#mainView {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 40px 0;
}

.main-btn {
  width: 160px;
  height: 44px;
  line-height: 44px;
  background: #e5e7eb;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.main-btn:hover {
  background: #d1d5db;
}

/* ===== CLIENT VIEW ===== */
#clientView {
  display: none;
  padding: 24px;
}

/* RETURN BUTTON */
.back-btn {
  width: 74px;
  height: 30px;
  background: #e5e7eb;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}

/* ===== CLIENT INFO ===== */
.client-info {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  display: block;
}

input,
select {
  width: 100%;
  padding: 8px;
  border: 1px solid rgba(204,204,204,0.8);
  border-radius: 6px;
  font-size: 14px;
}

/* SAVE BUTTON */
.save-wrapper {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}

.save-btn {
  width: 120px;
  height: 34px;
  background: #111827;
  color: #ffffff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* ===== HISTORY INDICATOR ===== */
.history-indicator {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  display: none;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.history-header h3 {
  font-size: 15px;
}

/* ✅ FIXED: STATIC WIDTH / FIT TEXT ONLY */
.history-sort {
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  width: auto;
  max-width: max-content;
  flex: 0 0 auto;
}

/* ===== EXPANDABLE SECTIONS ===== */
.history-section {
  background: #f3f4f6;
  border-radius: 8px;
  margin-bottom: 16px;
}

.history-section button {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 28px 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.history-content {
  display: none;
  padding: 24px 28px 32px;
  font-size: 14px;
  color: #6b7280;
}
</style>
</head>

<body>

<div id="mainView">
  <button class="main-btn" onclick="openClient('new')">New</button>
  <button class="main-btn" onclick="openClient('search')">Search</button>
</div>

<div id="clientView">

  <button class="back-btn" onclick="goBack()">← Return</button>

  <div class="client-info">
    <div class="input-grid">
      <div><label>Name</label><input></div>
      <div><label>Contact</label><input></div>
      <div><label>Email</label><input></div>
      <div><label>Address</label><input></div>
      <div>
        <label>City</label>
        <select><option>Select City</option></select>
      </div>
      <div>
        <label>Region</label>
        <input>
        <div class="save-wrapper">
          <button class="save-btn" id="saveBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="history-indicator" id="historyIndicator">
    <div class="history-header">
      <h3>History Indicator</h3>
      <select class="history-sort">
        <option>Newest → Oldest</option>
        <option>Oldest → Newest</option>
      </select>
    </div>

    <div class="history-section">
      <button onclick="toggleHistory(this)">Requests</button>
      <div class="history-content"></div>
    </div>

    <div class="history-section">
      <button onclick="toggleHistory(this)">Interactions</button>
      <div class="history-content"></div>
    </div>

    <div class="history-section">
      <button onclick="toggleHistory(this)">Invoice</button>
      <div class="history-content"></div>
    </div>
  </div>

</div>

<script>
function openClient(mode) {
  document.getElementById("mainView").style.display = "none";
  document.getElementById("clientView").style.display = "block";
  document.getElementById("historyIndicator").style.display =
    mode === "search" ? "block" : "none";
  document.getElementById("saveBtn").style.display =
    mode === "new" ? "inline-block" : "none";
}

function goBack() {
  document.getElementById("clientView").style.display = "none";
  document.getElementById("mainView").style.display = "flex";
}

function toggleHistory(btn) {
  const content = btn.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

document.getElementById("saveBtn").onclick = function () {
  document.querySelectorAll(".client-info input").forEach(input => {
    input.value = "";
  });
};
</script>

</body>
</html>
``
