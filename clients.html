<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clients</title>
 
<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}
 
body {
  background: transparent;
  color: #111827;
}
 
/* ===== MAIN VIEW ===== */
#mainView {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 40px 0;
}
 
.main-btn {
  width: 160px;
  height: 44px;
  line-height: 44px;
  background: #e5e7eb;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
 
.main-btn:hover {
  background: #d1d5db;
}
 
/* ===== CLIENT VIEW ===== */
#clientView {
  display: none;
  padding: 24px;
}
 
/* ===== RETURN BUTTON ===== */
.back-btn {
  width: 74px;
  height: 30px;
  background: #e5e7eb;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
 
/* ===== CLIENT INFO ===== */
.client-info {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}
 
.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}
 
label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  display: block;
}
 
input,
select {
  width: 100%;
  padding: 8px;
  border: 1px solid rgba(204,204,204,0.8);
  border-radius: 6px;
  font-size: 14px;
}
 
/* ===== SAVE BUTTON ===== */
.save-wrapper {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}
 
.save-btn {
  width: 120px;
  height: 34px;
  background: #111827;
  color: #ffffff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
 
/* ===== HISTORY INDICATOR ===== */
.history-wrapper {
  display: none;
}
 
/* FIXED TOP FRAME */
.history-top-frame {
  background: #e9eaec;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
 
.history-top-frame h3 {
  font-size: 14px;
  font-weight: 600;
  color: #111827;
}
 
/* DROPDOWN */
.history-sort {
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  width: auto;
  max-width: max-content;
  flex: 0 0 auto;
}
 
/* SECTION */
.history-section {
  margin-bottom: 16px;
}
 
/* HEADER FRAME */
.history-section-header {
  background: #e9eaec;
  border-radius: 10px;
  padding: 14px 20px;
  cursor: pointer;
}
 
.history-section-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: #111827;
}
 
/* CONTAINER FRAME */
.history-section-body {
  background: #f3f4f6;
  border-radius: 10px;
  min-height: 120px;
  margin-top: 6px;
  padding: 20px;
  display: none;
  font-size: 13px;
  color: #9ca3af;
}
</style>
</head>
 
<body>
 
<!-- ===== MAIN VIEW ===== -->
<div id="mainView">
  <button class="main-btn" onclick="openClient('new')">New</button>
  <button class="main-btn" onclick="openClient('search')">Search</button>
</div>
 
<!-- ===== CLIENT VIEW ===== -->
<div id="clientView">
 
<button class="back-btn" onclick="goBack()">← Return</button>
 
<div class="client-info">
  <div class="input-grid">
 
    <div>
      <label>Name</label>
      <input type="text">
    </div>
 
    <div>
      <label>Contact</label>
      <input type="text">
    </div>
 
    <div>
      <label>Email</label>
      <input type="email">
    </div>
 
    <div>
      <label>Address</label>
      <input type="text">
    </div>
 
    <div>
      <label>City</label>
      <select id="clientCity">
        <option value="">Select City</option>
      </select>
    </div>
 
    <div>
      <label>Region</label>
      <input type="text" id="clientRegion" readonly>
      <div class="save-wrapper">
        <button class="save-btn" id="saveBtn">Save</button>
      </div>
    </div>
 
  </div>
</div>
 
<!-- ===== HISTORY INDICATOR ===== -->
<div class="history-wrapper" id="historyIndicator">
 
  <!-- TOP FRAME: History Indicator + sort -->
  <div class="history-top-frame">
    <h3>History Indicator</h3>
    <select class="history-sort">
      <option>Newest → Oldest</option>
      <option>Oldest → Newest</option>
    </select>
  </div>
 
  <!-- REQUESTS -->
  <div class="history-section">
    <div class="history-section-header" onclick="toggleSection('requests')">
      <h3>Requests</h3>
    </div>
    <div class="history-section-body" id="requests"></div>
  </div>
 
  <!-- INTERACTIONS -->
  <div class="history-section">
    <div class="history-section-header" onclick="toggleSection('interactions')">
      <h3>Interactions</h3>
    </div>
    <div class="history-section-body" id="interactions"></div>
  </div>
 
  <!-- INVOICE -->
  <div class="history-section">
    <div class="history-section-header" onclick="toggleSection('invoice')">
      <h3>Invoice</h3>
    </div>
    <div class="history-section-body" id="invoice"></div>
  </div>
 
</div>
 
</div>

/* ===== MODE HANDLING ===== */
function openClient(mode) {
  document.getElementById("mainView").style.display = "none";
  document.getElementById("clientView").style.display = "block";
 
  if (mode === "search") {
    document.getElementById("historyIndicator").style.display = "block";
    document.getElementById("saveBtn").style.display = "none";
  } else {
    document.getElementById("historyIndicator").style.display = "none";
    document.getElementById("saveBtn").style.display = "inline-block";
  }
}
 
function goBack() {
  document.getElementById("clientView").style.display = "none";
  document.getElementById("mainView").style.display = "flex";
}
 
function toggleSection(id) {
  const section = document.getElementById(id);
  section.style.display = section.style.display === "block" ? "none" : "block";
}

/* ===== CITY DROPDOWN POPULATION ===== */
const citySelect = document.getElementById("clientCity");
const regionInput = document.getElementById("clientRegion");
 
cityData.forEach(function(item) {
  const option = document.createElement("option");
  option.value = item.city;
  option.textContent = item.city;
  citySelect.appendChild(option);
});
 
citySelect.addEventListener("change", function() {
  const selectedCity = this.value;
  const match = cityData.find(c => c.city === selectedCity);
  regionInput.value = match ? match.region : "";
});
 
/* ===== SAVE ACTION ===== */
document.getElementById("saveBtn").onclick = function () {
  document.querySelectorAll(".client-info input").forEach(function (input) {
    if (!input.hasAttribute("readonly")) {
      input.value = "";
    }
  });
  citySelect.value = "";
  regionInput.value = "";
};
