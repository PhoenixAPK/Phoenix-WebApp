/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}
 
body {
  background: transparent;
  color: #111827;
}
 
/* ===== MAIN VIEW ===== */
#mainView {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 40px 0;
}
 
/* UPDATED BUTTON STYLES TO MATCH INTERACTIONS PAGE */
.main-btn {
  /* Fixed dimensions for uniformity */
  width: 150px;
  height: 42px;
  
  /* Flexbox for perfect icon + text alignment */
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px; /* Space between icon and text */
  
  /* Default Light Style (for Search) */
  background: #f3f4f6;
  color: #374151;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
 
.main-btn:hover {
  background: #e5e7eb;
  border-color: #d1d5db;
}

/* Dark/Active Style (for New) - Matches Interactions Page */
.main-btn.primary {
  background: #111827;
  color: #ffffff;
  border-color: #111827;
}

.main-btn.primary:hover {
  background: #1f2937;
  border-color: #1f2937;
}
 
/* ===== CLIENT VIEW ===== */
#clientView {
  display: none;
  padding: 24px;
}
 
/* ===== RETURN BUTTON ===== */
.back-btn {
  width: 74px;
  height: 30px;
  background: #e5e7eb;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
 
/* ===== CLIENT INFO ===== */
.client-info {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}
 
.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}
 
label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  display: block;
}
 
input,
select {
  width: 100%;
  padding: 8px;
  border: 1px solid rgba(204,204,204,0.8);
  border-radius: 6px;
  font-size: 14px;
}
 
/* ===== SAVE BUTTON ===== */
.save-wrapper {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}
 
.save-btn {
  width: 120px;
  height: 34px;
  background: #111827;
  color: #ffffff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* ===== SEARCH TOOLS & RESULTS ===== */
#searchTools { display: none; }
#searchResults { display: none; }

.result-count {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 12px;
}

.result-item {
  padding: 12px;
  border-bottom: 1px solid #e5e7eb;
  cursor: pointer;
  transition: background 0.2s;
}

.result-item:hover { background: #f3f4f6; }
.result-item:last-child { border-bottom: none; }
 
/* ===== HISTORY INDICATOR ===== */
.history-wrapper { display: none; }
 
.history-top-frame {
  background: #e9eaec;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
 
.history-top-frame h3 {
  font-size: 14px;
  font-weight: 600;
  color: #111827;
}
 
.history-sort {
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  width: auto;
  max-width: max-content;
  flex: 0 0 auto;
}
 
.history-section { margin-bottom: 16px; }
 
.history-section-header {
  background: #e9eaec;
  border-radius: 10px;
  padding: 14px 20px;
  cursor: pointer;
}
 
.history-section-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: #111827;
}
 
.history-section-body {
  background: #f3f4f6;
  border-radius: 10px;
  min-height: 120px;
  margin-top: 6px;
  padding: 20px;
  display: none;
  font-size: 13px;
  color: #9ca3af;

<!-- ===== MAIN VIEW ===== -->
<div id="mainView">

</div>
 
<!-- ===== CLIENT VIEW ===== -->
<div id="clientView">

<!-- ===== SEARCH TOOLS ===== -->
<div class="client-info" id="searchTools">

    <div>
      <label>Address</label>

    <div>
      <label>City</label>
      <select id="searchCity" onchange="performSearch()">

      </select>
    </div>
    <div>
      <label>Region</label>
      <input type="text" id="searchRegion" readonly>
    </div>
  </div>
</div>

<!-- ===== SEARCH RESULTS ===== -->
<div class="client-info" id="searchResults" style="display:none;">
  <div class="result-count">🔍 Showing: <span id="resultCount">0</span></div>
  <div id="resultsList"></div>
</div>
 
<!-- ===== CLIENT INFO FORM ===== -->
<div class="client-info" id="clientForm" style="display:none;">
  <div class="input-grid">
 
    <div>
      <label>Name</label>
      <input type="text" id="clientName">
    </div>
 
    <div>
      <label>Contact</label>
      <input type="text" id="clientContact">
    </div>
 
    <div>
      <label>Email</label>
      <input type="email" id="clientEmail">
    </div>
 
    <div>
      <label>Address</label>
      <input type="text" id="clientAddress">
    </div>
 
    <div>
      <label>City</label>

    </div>

    </div>

</div>
 
<!-- ===== HISTORY INDICATOR ===== -->
<div class="history-wrapper" id="historyIndicator">

    </div>

    </div>

</div>
 
<script>
// ===== 1. GLOBAL FUNCTIONS =====
window.openClient = function(mode) {
  document.getElementById("mainView").style.display = "none";
  document.getElementById("clientView").style.display = "block";
  
  if (mode === "search") {
    document.getElementById("searchTools").style.display = "block";
    document.getElementById("searchResults").style.display = "block";
    document.getElementById("clientForm").style.display = "none";
    document.getElementById("historyIndicator").style.display = "none";
    document.getElementById("saveBtn").style.display = "none";
    performSearch();
  } else {
    document.getElementById("searchTools").style.display = "none";
    document.getElementById("searchResults").style.display = "none";
    document.getElementById("clientForm").style.display = "block";
    document.getElementById("historyIndicator").style.display = "none";
    document.getElementById("saveBtn").style.display = "inline-block";
    clearForm();
  }
};

window.goBack = function() {
  document.getElementById("clientView").style.display = "none";
  document.getElementById("mainView").style.display = "flex";
  window.currentClientId = null;
};

window.toggleSection = function(id) {
  const section = document.getElementById(id);
  section.style.display = section.style.display === "block" ? "none" : "block";
};

window.clearForm = function() {
  document.querySelectorAll("#clientForm input:not([readonly]), #clientForm select").forEach(el => el.value = "");
  document.getElementById("clientRegion").value = "";
  window.currentClientId = null;
};

window.loadClient = function(client) {
  window.currentClientId = client.id;
  document.getElementById("clientName").value = client.name || '';
  document.getElementById("clientContact").value = client.contact || '';
  document.getElementById("clientEmail").value = client.email || '';
  document.getElementById("clientAddress").value = client.address || '';
  document.getElementById("clientCity").value = client.city || '';
  document.getElementById("clientRegion").value = client.region || '';
  
  document.getElementById("searchTools").style.display = "none";
  document.getElementById("searchResults").style.display = "none";
  document.getElementById("clientForm").style.display = "block";
  document.getElementById("historyIndicator").style.display = "block";
  
  document.getElementById("requests").innerHTML = '<p>No requests found</p>';
  document.getElementById("interactions").innerHTML = '<p>No interactions found</p>';
  document.getElementById("invoice").innerHTML = '<p>No invoices found</p>';
};

window.saveClient = async function() {
  const btn = document.getElementById("saveBtn");
  const originalText = btn.textContent;
  btn.textContent = "Saving...";
  btn.disabled = true;
  
  const clientData = {
    name: document.getElementById("clientName").value,
    contact: document.getElementById("clientContact").value,
    email: document.getElementById("clientEmail").value,
    address: document.getElementById("clientAddress").value,
    city: document.getElementById("clientCity").value,
    region: document.getElementById("clientRegion").value
  };
  
  try {
    if (!window.supabaseClient) throw new Error("Database not connected");
    
    if (window.currentClientId) {
      const { error } = await window.supabaseClient.from('clients').update(clientData).eq('id', window.currentClientId);
      if (error) throw error;
    } else {
      const { error } = await window.supabaseClient.from('clients').insert([clientData]);
      if (error) throw error;
    }
    alert("Client saved successfully!");
    openClient('new');
  } catch (err) {
    console.error("Save error:", err);
    alert("Error saving client. Check console.");
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
};

window.performSearch = async function() {
  const name = document.getElementById("searchName").value.trim().toLowerCase();
  const contact = document.getElementById("searchContact").value.trim().toLowerCase();
  const email = document.getElementById("searchEmail").value.trim().toLowerCase();
  const address = document.getElementById("searchAddress").value.trim().toLowerCase();
  const city = document.getElementById("searchCity").value.trim();
  const region = document.getElementById("searchRegion").value.trim().toLowerCase();
  
  const resultsList = document.getElementById("resultsList");
  const resultCount = document.getElementById("resultCount");
  
  if (!name && !contact && !email && !address && !city && !region) {
    resultsList.innerHTML = '';
    resultCount.textContent = '0';
    return;
  }
  
  try {
    if (!window.supabaseClient) throw new Error("Database not connected");
    
    let query = window.supabaseClient.from('clients').select('*');
    if (name) query = query.ilike('name', `%${name}%`);
    if (contact) query = query.ilike('contact', `%${contact}%`);
    if (email) query = query.ilike('email', `%${email}%`);
    if (address) query = query.ilike('address', `%${address}%`);
    if (city) query = query.eq('city', city);
    if (region) query = query.ilike('region', `%${region}%`);
    
    const { data, error } = await query;
    if (error) throw error;
    
    if (!data || data.length === 0) {
      resultsList.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;">No clients found</div>';
      resultCount.textContent = '0';
    } else {
      resultCount.textContent = data.length;
      resultsList.innerHTML = '';
      data.forEach(client => {
        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `<strong>${client.name}</strong><br><small>${client.email || 'No email'} | ${client.city || 'No city'}</small>`;
        item.onclick = () => window.loadClient(client);
        resultsList.appendChild(item);
      });
    }
  } catch (err) {
    console.error("Search error:", err);
    resultsList.innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">Error searching</div>';
    resultCount.textContent = '0';
  }
};
