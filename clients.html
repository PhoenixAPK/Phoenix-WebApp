<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clients</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: transparent;
  color: #111827;
}

/* ================= MAIN VIEW ================= */
#mainView {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 40px 0;
}

.main-btn {
  width: 160px;
  height: 110px;
  background: #e5e7eb;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.main-btn:hover {
  background: #d1d5db;
}

/* ================= CLIENT DETAIL ================= */
#clientView {
  display: none;
  padding: 24px;
}

.back-btn {
  background: none;
  border: none;
  font-weight: 600;
  margin-bottom: 16px;
  cursor: pointer;
}

/* ================= CLIENT INFO ================= */
.client-info {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

label {
  display: block;
  margin-bottom: 4px;
  font-weight: 500;
  color: #333;
  font-size: 13px;
}

input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid rgba(204,204,204,0.8);
  border-radius: 6px;
  font-size: 14px;
  background-color: rgba(255,255,255,0.95);
}

input:focus, select:focus {
  border-color: #046C4E;
  outline: none;
  box-shadow: 0 0 5px rgba(4,108,78,0.3);
}

/* ================= HISTORY ================= */
.history-card {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.history-box {
  background: #f0f0f0;
  border-radius: 6px;
  padding: 15px;
  color: #666;
  font-size: 13px;
}

.history-item {
  margin-bottom: 8px;
}

.history-note {
  font-size: 12px;
  font-style: italic;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- ================= MAIN VIEW ================= -->
<div id="mainView">
  <button class="main-btn" onclick="openNewClient()">New</button>
  <button class="main-btn" onclick="openSearch()">Search</button>
</div>

<!-- ================= CLIENT DETAIL VIEW ================= -->
<div id="clientView">

  <button class="back-btn" onclick="goBack()">← Back</button>

  <!-- CLIENT INFO -->
  <div class="client-info">
    <div class="input-grid">
      <div>
        <label>Client Name</label>
        <input id="clientName">
      </div>
      <div>
        <label>Client Phone</label>
        <input id="clientPhone">
      </div>
      <div>
        <label>Client Email</label>
        <input id="clientEmail">
      </div>
      <div>
        <label>Client Address</label>
        <input id="clientAddress">
      </div>
      <div>
        <label>Client City</label>
        <select id="clientCity">
          <option value="">Select City</option>
        </select>
      </div>
      <div>
        <label>Region</label>
        <input id="clientRegion">
      </div>
    </div>
  </div>

  <!-- CLIENT HISTORY -->
  <div class="history-card">
    <div class="history-header">
      <strong>Client History</strong>
      <select id="sortHistory">
        <option value="asc">Oldest → Newest</option>
        <option value="desc">Newest → Oldest</option>
      </select>
    </div>

    <div class="history-box" id="historyBox">
      <div class="history-note">No history available for this client.</div>
      <div class="history-note">History is read-only and cannot be modified.</div>
    </div>
  </div>

</div>

<script>
const historyData = [];

function openNewClient() {
  clearClientForm();
  document.getElementById("mainView").style.display = "none";
  document.getElementById("clientView").style.display = "block";
}

function openSearch() {
  document.getElementById("mainView").style.display = "none";
  document.getElementById("clientView").style.display = "block";
}

function goBack() {
  document.getElementById("clientView").style.display = "none";
  document.getElementById("mainView").style.display = "flex";
}

function clearClientForm() {
  document.querySelectorAll("#clientView input").forEach(i => i.value = "");
  document.getElementById("clientCity").value = "";
}

document.getElementById("sortHistory").addEventListener("change", renderHistory);

function renderHistory() {
  const box = document.getElementById("historyBox");
  box.innerHTML = "";

  if (historyData.length === 0) {
    box.innerHTML = `
      <div class="history-note">No history available for this client.</div>
      <div class="history-note">History is read-only and cannot be modified.</div>
    `;
    return;
  }

  const order = document.getElementById("sortHistory").value;
  const sorted = [...historyData].sort((a,b) => {
    return order === "asc" ? a.ts - b.ts : b.ts - a.ts;
  });

  sorted.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.textContent = item.text;
    box.appendChild(div);
  });

  const note = document.createElement("div");
  note.className = "history-note";
  note.textContent = "History is read-only and cannot be modified.";
  box.appendChild(note);
}
</script>

</body>
</html>
