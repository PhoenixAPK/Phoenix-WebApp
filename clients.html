<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clients</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: transparent;
  color: #111827;
}

/* ===== MAIN VIEW ===== */
#mainView {
  display: flex;
  justify-content: center;   /* center buttons as a group */
  gap: 20px;
  padding: 40px 0;
  /* ❌ removed align-items:center to avoid vertical centering */
}

.main-btn {
  width: 230px;              /* matches original buttons */
  height: 48px;
  background: #e5e7eb;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.main-btn:hover {
  background: #d1d5db;
}
  
/* ===== CLIENT VIEW ===== */
#clientView {
  display: none;           /* HIDDEN UNTIL CLICK */
  padding: 24px;
}

.back-btn {
  background: none;
  border: none;
  font-weight: 600;
  margin-bottom: 16px;
  cursor: pointer;
}

/* ===== CLIENT INFO ===== */
.client-info {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

label {
  display: block;
  margin-bottom: 4px;
  font-weight: 500;
  color: #333;
  font-size: 13px;
}

input,
select {
  width: 100%;
  padding: 8px;
  border: 1px solid rgba(204,204,204,0.8);
  border-radius: 6px;
  font-size: 14px;
  background-color: rgba(255,255,255,0.95);
}

input:focus,
select:focus {
  border-color: #046C4E;
  outline: none;
  box-shadow: 0 0 5px rgba(4,108,78,0.3);
}

/* ===== HISTORY ===== */
.history-card {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.history-box {
  background: #f0f0f0;
  border-radius: 6px;
  padding: 15px;
  color: #666;
  font-size: 13px;
}

.history-note {
  font-size: 12px;
  font-style: italic;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- ===== MAIN VIEW ===== -->
<div id="mainView">
  <button class="main-btn" onclick="openClient()">New</button>
  <button class="main-btn" onclick="openClient()">Search</button>
</div>

<!-- ===== CLIENT VIEW ===== -->
<div id="clientView">

  <button class="back-btn" onclick="goBack()">← Back</button>

  <div class="client-info">
    <div class="input-grid">
      <div>
        <label>Name</label>
        <input>
      </div>
      <div>
        <label>Contact</label>
        <input>
      </div>
      <div>
        <label>Email</label>
        <input>
      </div>
      <div>
        <label>Address</label>
        <input>
      </div>
      <div>
        <label>City</label>
        <select>
          <option value="">Select City</option>
        </select>
      </div>
      <div>
        <label>Region</label>
        <input>
      </div>
    </div>
  </div>

  <div class="history-card">
    <div class="history-header">
      <strong>Client History</strong>
      <select>
        <option>Oldest → Newest</option>
        <option>Newest → Oldest</option>
      </select>
    </div>

    <div class="history-box">
      No history available for this client.
      <div class="history-note">
        History is read-only and cannot be modified.
      </div>
    </div>
  </div>

</div>

<script>
function openClient() {
  document.getElementById("mainView").style.display = "none";
  document.getElementById("clientView").style.display = "block";
}

function goBack() {
  document.getElementById("clientView").style.display = "none";
  document.getElementById("mainView").style.display = "flex";
}
</script>

</body>
</html>
