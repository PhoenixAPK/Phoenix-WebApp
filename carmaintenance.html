<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Maintenance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* 🔹 GLOBAL RESET */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
body { background: #ffffff; padding: 20px 40px; color: #111827; }

/* 🔹 MAIN MENU (Moved Up) */
.main-menu { 
    display: flex; 
    justify-content: center; 
    gap: 20px; 
    margin-top: 20px; /* Reduced from 60px to match other pages */
}
.menu-btn { 
    padding: 16px 40px; 
    background: #f3f4f6; 
    border: 1px solid #e5e7eb; 
    border-radius: 8px; 
    font-size: 15px; 
    font-weight: 600; 
    cursor: pointer; 
    color: #374151; 
}
.menu-btn:hover { background: #e5e7eb; }

/* 🔹 SECTIONS */
.section-view { display: none; }
.section-view.active { display: block; }
.section-header { display: flex; align-items: center; margin-bottom: 20px; }
.back-btn { 
    width: 90px; 
    height: 34px; 
    background: #e5e7eb; 
    border: none; 
    border-radius: 6px; 
    font-size: 13px; 
    font-weight: 600; 
    cursor: pointer; 
}
.back-btn:hover { background: #d1d5db; }

/* 🔹 QUEUE CONTAINER */
.queue-container { 
    margin: 0 auto; 
    width: 95%; 
    max-width: 1300px; 
    background: #fff; 
    border-radius: 12px; 
    overflow: hidden; 
    border: 1px solid #e0e0e0; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
}
.queue-header-box { 
    background: #e5e7eb; 
    display: grid; 
    grid-template-columns: 60% 40%; 
    border-bottom: 1px solid #d1d5db; 
}
.header-title { 
    padding: 12px 30px; 
    font-family: 'Times New Roman', serif; 
    font-weight: bold; 
    font-size: 1.1rem; 
    letter-spacing: 2px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}
.header-stats { 
    padding: 12px 30px; 
    font-family: 'Times New Roman', serif; 
    font-weight: bold; 
    font-size: 1.1rem; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    border-left: 1px solid #d1d5db; 
}

/* 🔹 TABLE */
table { width: 100%; border-collapse: collapse; }
thead { background: #fafafa; }
th { padding: 15px 20px; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid #e0e0e0; text-align: center; }
td { padding: 12px 20px; border-bottom: 1px solid #eee; font-size: 0.85rem; vertical-align: top; }
tr:hover td { background: #f9f9f9; }

/* 🔹 INPUTS */
.input-cell { display: flex; gap: 8px; justify-content: center; }
.input-cell input, .input-cell select { padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; width: 100%; min-width: 60px; }
.qty-input { max-width: 70px; }
.unit-select { max-width: 90px; }
.price-input { max-width: 90px; }
.date-input { max-width: 130px; }
.name-input { max-width: 140px; font-weight: 600; }

/* 🔹 BUTTONS */
.action-btns { display: flex; gap: 6px; justify-content: center; align-items: center; }
.action-btn { border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
.save-btn { background: #2e7d32; }
.add-new-btn { background: #16a34a; display: none; }
.saved-list { margin-top: 8px; font-size: 12px; color: #4b5563; background: #f3f4f6; border-radius: 6px; padding: 6px; border: 1px solid #e5e7eb; }
.saved-row { display: flex; justify-content: space-between; border-bottom: 1px solid #e5e7eb; padding: 3px 0; }
.add-charge-wrapper { margin-top: 24px; text-align: center; }
.add-charge-btn { padding: 12px 24px; background: #fff; border: 2px dashed #d1d5db; border-radius: 8px; color: #6b7280; font-weight: 600; cursor: pointer; }

/* 🔹 SEARCH STYLES */
.search-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
.search-tab { padding: 10px 24px; border: 1px solid #d1d5db; border-radius: 20px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }
.search-tab.active { background: #111827; color: #fff; border-color: #111827; }

.search-panel { display: none; justify-content: center; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-panel.active { display: flex; }

.search-label { font-weight: 600; color: #374151; }
.search-input { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
.search-submit { padding: 10px 24px; background: #111827; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
.search-submit:hover { background: #374151; }

.months-horizontal { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.month-chip { padding: 10px 16px; border: 1px solid #d1d5db; border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; background: #fff; min-width: 70px; }
.month-chip:hover { background: #f3f4f6; }

.years-horizontal { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
.year-chip { padding: 10px 20px; border: 1px solid #d1d5db; border-radius: 6px; text-align: center; cursor: pointer; font-size: 14px; background: #fff; }
.year-chip:hover, .year-chip.active { background: #111827; color: #fff; border-color: #111827; }

.result-label { text-align: center; margin-bottom: 20px; font-weight: 600; color: #059669; font-size: 15px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- 🔹 MAIN MENU (Buttons moved up) -->
<div id="mainMenu" class="main-menu">
    <button class="menu-btn" onclick="showCurrentMonth()">Current Month</button>
    <button class="menu-btn" onclick="showSearch()">Monthly Search</button>
</div>

<!-- 🔹 CURRENT MONTH VIEW -->
<div id="currentMonthSection" class="section-view">
    <div class="section-header">
        <button class="back-btn" onclick="goToMainMenu()">← Return</button>
    </div>
    <div class="queue-container">
        <div class="queue-header-box">
            <div class="header-title">CAR MAINTENANCE</div>
            <div class="header-stats" id="headerTotal">Total | 0.00 Dh</div>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 20%;">ITEM</th>
                    <th style="width: 15%;">QUANTITY</th>
                    <th style="width: 15%;">UNIT</th>
                    <th style="width: 15%;">PRICE (DH)</th>
                    <th style="width: 15%;">DATE</th>
                    <th style="width: 20%;">ACTION</th>
                </tr>
            </thead>
            <tbody id="maintenanceBody"></tbody>
        </table>
    </div>
    <div class="add-charge-wrapper">
        <button class="add-charge-btn" onclick="addAdditionalCharge()">+ Add Additional Charge</button>
    </div>
</div>

<!-- 🔹 SEARCH VIEW -->
<div id="searchSection" class="section-view">
    <div class="section-header">
        <button class="back-btn" onclick="goToMainMenu()">← Return</button>
    </div>

    <div class="search-nav">
        <button class="search-tab active" onclick="switchSearchMode('range')">📅 Dates (From/To)</button>
        <button class="search-tab" onclick="switchSearchMode('monthly')">📆 Monthly</button>
        <button class="search-tab" onclick="switchSearchMode('yearly')">🗓️ Yearly</button>
    </div>

    <!-- Range Panel -->
    <div id="panel-range" class="search-panel active">
        <span class="search-label">From:</span>
        <input type="date" id="searchFrom" class="search-input">
        <span class="search-label">To:</span>
        <input type="date" id="searchTo" class="search-input">
        <button class="search-submit" onclick="searchByRange()">Search</button>
    </div>

    <!-- Monthly Panel -->
    <div id="panel-monthly" class="search-panel">
        <div class="months-horizontal" id="monthlyGrid"></div>
    </div>

    <!-- Yearly Panel -->
    <div id="panel-yearly" class="search-panel">
        <div class="years-horizontal" id="yearlyGrid"></div>
        <div class="months-horizontal" id="yearlyMonthGrid" style="display:none; margin-top:10px;"></div>
    </div>

    <div id="resultLabel" class="result-label hidden"></div>

    <div id="searchResultsContainer" class="hidden">
        <div class="queue-container">
            <div class="queue-header-box">
                <div class="header-title">SEARCH RESULTS</div>
                <div class="header-stats" id="searchTotal">Total | 0.00 Dh</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ITEM</th>
                        <th>QUANTITY</th>
                        <th>UNIT</th>
                        <th>PRICE (DH)</th>
                        <th>DATE</th>
                        <th>AMOUNT</th>
                    </tr>
                </thead>
                <tbody id="searchMaintenanceBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const DB = window.supabase.createClient(
    "https://puymabrkwtpvhropcvqk.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eW1hYnJrd3Rwdmhyb3BjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyOTUsImV4cCI6MjA4ODg2NzI5NX0.kg7WvMRblzVf2iaQbt4Zz7DuNDgHGn9AKFHM_maGiTk"
);

const FIXED_ITEMS = ["Diesel Refill", "Engine Oil", "Oil Filter", "Air Filter", "Diesel Pump", "Cooling Liquid", "Tires", "Battery", "Brake Pads", "Brake Discs", "Wiper Blades", "AC Filter"];
const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
let currentMonth = new Date().toISOString().slice(0, 7);
let additionalChargesCount = 0;

document.addEventListener('DOMContentLoaded', () => {
    renderFixedRows('maintenanceBody');
    loadMonthData(currentMonth);
    initSearchTools();
});

// 🔹 NAVIGATION LOGIC
window.goToMainMenu = function() {
    // Reset search state completely
    resetSearchState();
    
    // Show Main Menu buttons
    document.getElementById('mainMenu').style.display = 'flex';
    
    // Hide all sections
    document.querySelectorAll('.section-view').forEach(el => el.classList.remove('active'));
};

function resetSearchState() {
    document.querySelector('.search-nav').classList.remove('hidden');
    document.querySelectorAll('.search-panel').forEach(p => {
        p.classList.remove('hidden');
        p.style.display = ''; 
    });
    document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.search-tab').classList.add('active');
    document.getElementById('panel-range').classList.add('active');
    document.getElementById('panel-monthly').classList.remove('active');
    document.getElementById('panel-yearly').classList.remove('active');
    document.getElementById('searchResultsContainer').classList.add('hidden');
    document.getElementById('resultLabel').classList.add('hidden');
    document.getElementById('yearlyMonthGrid').style.display = 'none';
    document.querySelectorAll('.year-chip').forEach(c => c.classList.remove('active'));
}

window.showCurrentMonth = function() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('currentMonthSection').classList.add('active');
    document.getElementById('searchSection').classList.remove('active');
    loadMonthData(currentMonth);
};

window.showSearch = function() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('searchSection').classList.add('active');
    document.getElementById('currentMonthSection').classList.remove('active');
    resetSearchState();
};

// 🔹 RENDER ROWS
function renderFixedRows(tbodyId) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = '';
    FIXED_ITEMS.forEach(item => tbody.appendChild(createRow(item, `row-${item.replace(/\s/g, '-')}`, false)));
}

function createRow(itemName, rowId, isEditableName) {
    const tr = document.createElement('tr');
    tr.id = rowId;
    const nameCellContent = isEditableName 
        ? `<input type="text" class="name-input" placeholder="Enter Item Name" value="${itemName}">` 
        : `<span style="font-weight:bold; font-family:'Times New Roman', serif;">${itemName}</span>`;

    tr.innerHTML = `
        <td>${nameCellContent}</td>
        <td><div class="input-cell"><input type="number" class="qty-input" placeholder="0" min="0"></div><div class="saved-list" id="list-${rowId}"></div></td>
        <td><div class="input-cell"><select class="unit-select"><option value="Liters">Liters</option><option value="Piece">Piece</option></select></div></td>
        <td><div class="input-cell"><input type="number" class="price-input" placeholder="0.00" min="0" step="0.01"></div></td>
        <td><div class="input-cell"><input type="date" class="date-input" value="${new Date().toISOString().slice(0,10)}"></div></td>
        <td style="text-align:center;">
            <div class="action-btns">
                <button class="action-btn save-btn" onclick="saveEntry('${rowId}')">SAVE</button>
                <button class="action-btn add-new-btn" onclick="resetRow('${rowId}')">ADD NEW</button>
            </div>
        </td>
    `;
    return tr;
}

window.addAdditionalCharge = function() {
    additionalChargesCount++;
    const rowId = `dynamic-${additionalChargesCount}`;
    document.getElementById('maintenanceBody').appendChild(createRow("", rowId, true));
};

window.saveEntry = async function(rowId) {
    const row = document.getElementById(rowId);
    const itemNameInput = row.querySelector('.name-input');
    const itemName = itemNameInput ? (itemNameInput.value || "Unnamed Item") : row.querySelector('td span').innerText;
    const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
    const unit = row.querySelector('.unit-select').value;
    const price = parseFloat(row.querySelector('.price-input').value) || 0;
    const date = row.querySelector('.date-input').value;

    if (!qty || !price) { alert("Please enter Quantity and Price."); return; }

    const amount = qty * price;
    const monthValue = `${date.slice(0,7)}-01`;

    try {
        const { error } = await DB.from('car_maintenance').insert([{
            month: monthValue,
            item_name: itemName,
            quantity: qty,
            unit: unit,
            price: price,
            amount: amount,
            entry_date: date
        }]);

        if (error) throw error;

        row.querySelector('.save-btn').style.display = 'inline-block';
        row.querySelector('.add-new-btn').style.display = 'inline-block';
        addSavedEntryToList(rowId, date, qty, unit, price, amount);
        updateTotal();
    } catch (err) {
        console.error(err);
        alert("Error saving: " + err.message);
    }
};

function addSavedEntryToList(rowId, date, qty, unit, price, amount) {
    const list = document.getElementById(`list-${rowId}`);
    if(list.children.length === 0) list.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'saved-row';
    div.innerHTML = `<span>${date} (${qty} ${unit})</span> <span>${amount.toFixed(2)} Dh</span>`;
    list.appendChild(div);
}

window.resetRow = function(rowId) {
    const row = document.getElementById(rowId);
    row.querySelector('.qty-input').value = '';
    row.querySelector('.price-input').value = '';
    row.querySelector('.add-new-btn').style.display = 'none';
};

async function loadMonthData(month) {
    if(!month) return;
    currentMonth = month;
    const monthValue = `${month}-01`;
    document.querySelectorAll('.saved-list').forEach(el => el.innerHTML = '');
    document.querySelectorAll('.save-btn').forEach(btn => btn.style.display = 'inline-block');
    document.querySelectorAll('.add-new-btn').forEach(btn => btn.style.display = 'none');

    try {
        const { data, error } = await DB.from('car_maintenance').select('*').eq('month', monthValue);
        if (error || !data) { updateTotal(); return; }

        const items = {};
        data.forEach(d => { if (!items[d.item_name]) items[d.item_name] = []; items[d.item_name].push(d); });

        for (const [itemName, entries] of Object.entries(items)) {
            let rowId = `row-${itemName.replace(/\s/g, '-')}`;
            let row = document.getElementById(rowId);
            if (row) {
                entries.forEach(e => addSavedEntryToList(rowId, e.entry_date || e.created_at.split('T')[0], e.quantity, e.unit, e.price, e.amount));
                if (entries.length > 0) {
                    row.querySelector('.save-btn').style.display = 'inline-block';
                    row.querySelector('.add-new-btn').style.display = 'inline-block';
                }
            }
        }
        updateTotal();
    } catch (err) { console.error(err); }
}

async function updateTotal() {
    const monthValue = `${currentMonth}-01`;
    const { data, error } = await DB.from('car_maintenance').select('amount').eq('month', monthValue);
    if (error || !data) return;
    const total = data.reduce((sum, row) => sum + row.amount, 0);
    document.getElementById('headerTotal').textContent = `Total | ${total.toFixed(2)} Dh`;
}

// SEARCH FUNCTIONS
function initSearchTools() {
    renderMonthlyGrid();
    renderYearlyGrid();
}

window.switchSearchMode = function(mode) {
    document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.search-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${mode}`).classList.add('active');
    event.target.classList.add('active');
    hideSearchResults();
};

function hideSearchResults() {
    document.getElementById('searchResultsContainer').classList.add('hidden');
    document.getElementById('resultLabel').classList.add('hidden');
}

function renderMonthlyGrid() {
    const grid = document.getElementById('monthlyGrid');
    grid.innerHTML = '';
    const currentYear = new Date().getFullYear();
    MONTHS.forEach((m, i) => {
        const val = `${currentYear}-${String(i+1).padStart(2,'0')}`;
        const chip = document.createElement('div');
        chip.className = 'month-chip';
        chip.textContent = m;
        chip.onclick = () => executeSearch(val, `Monthly: ${m} ${currentYear}`);
        grid.appendChild(chip);
    });
}

function renderYearlyGrid() {
    const grid = document.getElementById('yearlyGrid');
    grid.innerHTML = '';
    for(let y = 2026; y <= 2036; y++) {
        const chip = document.createElement('div');
        chip.className = 'year-chip';
        chip.textContent = y;
        chip.onclick = () => selectYear(y);
        grid.appendChild(chip);
    }
}

window.selectYear = function(year) {
    document.querySelectorAll('.year-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    
    const monthGrid = document.getElementById('yearlyMonthGrid');
    monthGrid.style.display = 'flex';
    monthGrid.innerHTML = '';
    
    MONTHS.forEach((m, i) => {
        const val = `${year}-${String(i+1).padStart(2,'0')}`;
        const chip = document.createElement('div');
        chip.className = 'month-chip';
        chip.textContent = m;
        chip.onclick = () => executeSearch(val, `Monthly: ${m} ${year}`);
        monthGrid.appendChild(chip);
    });
};

window.searchByRange = function() {
    const from = document.getElementById('searchFrom').value;
    const to = document.getElementById('searchTo').value;
    if(!from || !to) { alert("Please select both From and To dates."); return; }
    
    DB.from('car_maintenance').select('*').gte('entry_date', from).lte('entry_date', to).order('entry_date', {ascending: false}).then(({ data, error }) => {
        if(error) { alert("Error: " + error.message); return; }
        renderSearchResults(data, `Range: ${from} to ${to}`);
    });
};

function executeSearch(monthVal, label) {
    const monthDate = `${monthVal}-01`;
    DB.from('car_maintenance').select('*').eq('month', monthDate).order('entry_date', {ascending: false}).then(({ data, error }) => {
        if(error) { alert("Error: " + error.message); return; }
        renderSearchResults(data, label);
    });
}

function renderSearchResults(data, label) {
    const container = document.getElementById('searchResultsContainer');
    const tbody = document.getElementById('searchMaintenanceBody');
    const labelDiv = document.getElementById('resultLabel');
    const totalSpan = document.getElementById('searchTotal');

    document.querySelector('.search-nav').classList.add('hidden');
    document.querySelectorAll('.search-panel').forEach(p => p.classList.add('hidden'));
    
    labelDiv.textContent = `Showing results for: ${label}`;
    labelDiv.classList.remove('hidden');
    
    tbody.innerHTML = '';
    
    if(!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">No results found</td></tr>';
        totalSpan.textContent = 'Total | 0.00 Dh';
        container.classList.remove('hidden');
        return;
    }

    let total = 0;
    data.forEach(row => {
        total += row.amount;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong>${row.item_name}</strong></td>
            <td>${row.quantity}</td>
            <td>${row.unit}</td>
            <td>${row.price}</td>
            <td>${row.entry_date || row.created_at.split('T')[0]}</td>
            <td style="font-weight:bold; color:#059669;">${row.amount.toFixed(2)} Dh</td>
        `;
        tbody.appendChild(tr);
    });

    totalSpan.textContent = `Total | ${total.toFixed(2)} Dh`;
    container.classList.remove('hidden');
}
</script>
</body>
</html>
